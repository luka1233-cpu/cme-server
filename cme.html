<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CME — Currency Momentum Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@400;500&display=swap');
:root {
  --bg:#080810;--bg2:#0e0e1a;--bg3:#13131f;--bg4:#1a1a2a;
  --bd:#1f1f32;--bd2:#2a2a42;
  --tx:#ddddf0;--tx2:#7777a0;--tx3:#444468;
  --grn:#00d4a0;--gbg:rgba(0,212,160,.07);--gbd:rgba(0,212,160,.18);
  --red:#ff4060;--rbg:rgba(255,64,96,.07);--rbd:rgba(255,64,96,.18);
  --amb:#f5a623;--abg:rgba(245,166,35,.07);--abd:rgba(245,166,35,.2);
  --yel:#f5d923;--ybg:rgba(245,217,35,.07);--ybd:rgba(245,217,35,.18);
  --blu:#4a9eff;--bbg:rgba(74,158,255,.07);
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:13px;line-height:1.5}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--grn);letter-spacing:.05em}
.logo em{color:var(--tx2);font-style:normal;font-weight:300}
.hdr-meta{display:flex;align-items:center;gap:16px}
.hdr-item{font-family:var(--mono);font-size:10px;color:var(--tx2)}
.hdr-item strong{color:var(--tx);font-weight:500}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--grn);margin-right:5px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes newsAlert{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,64,96,0)}50%{opacity:.7;box-shadow:0 0 8px 3px rgba(255,64,96,.5)}}
@keyframes newsAlertGrn{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,212,160,0)}50%{opacity:.7;box-shadow:0 0 8px 3px rgba(0,212,160,.5)}}
.news-alert-bear{animation:newsAlert 1.2s ease infinite;border:1px solid var(--red)!important;background:var(--rbg)!important;color:var(--red)!important;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.04em}
.news-alert-bull{animation:newsAlertGrn 1.2s ease infinite;border:1px solid var(--grn)!important;background:var(--gbg)!important;color:var(--grn)!important;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.04em}
.lang-btn{font-family:var(--mono);font-size:10px;font-weight:600;background:var(--bg4);border:1px solid var(--bd2);color:var(--tx2);padding:4px 12px;border-radius:4px;cursor:pointer;letter-spacing:.06em;transition:all .15s}
.lang-btn:hover{color:var(--tx);border-color:var(--tx2)}
.wrap{max-width:1480px;margin:0 auto;padding:20px 24px 40px}
.sec{margin-bottom:28px}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-title{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--tx2);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
.sec-rule{flex:1;height:1px;background:var(--bd)}
.sec-tag{font-family:var(--mono);font-size:10px;color:var(--tx3);background:var(--bg4);border:1px solid var(--bd);padding:1px 8px;border-radius:3px;white-space:nowrap}
.regime-bar{display:flex;gap:10px}
.regime-card{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.regime-card.active-regime{border-color:var(--grn);background:var(--gbg)}
.regime-card.warn-regime{border-color:var(--amb);background:var(--abg)}
.regime-card.off-regime{border-color:var(--red);background:var(--rbg)}
.regime-icon{font-size:18px}
.regime-label{font-family:var(--mono);font-size:10px;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase}
.regime-val{font-family:var(--mono);font-size:13px;font-weight:600}
.c-grn{color:var(--grn)}.c-red{color:var(--red)}.c-amb{color:var(--amb)}.c-tx2{color:var(--tx2)}
.ccy-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1100px){.ccy-grid{grid-template-columns:repeat(2,1fr)}}
.ccy-card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:14px;position:relative;overflow:hidden;transition:border-color .2s}
.ccy-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ccy-card.c-sbull::after,.ccy-card.c-bull::after{background:var(--grn)}
.ccy-card.c-wbull::after{background:var(--yel)}
.ccy-card.c-neut::after,.ccy-card.c-noedge::after{background:var(--tx3)}
.ccy-card.c-wbear::after{background:var(--amb)}
.ccy-card.c-bear::after,.ccy-card.c-sbear::after{background:var(--red)}
.ccy-card:hover{border-color:var(--bd2)}
.ccy-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ccy-sym{font-family:var(--mono);font-size:22px;font-weight:600}
.ccy-sym.sbull,.ccy-sym.bull{color:var(--grn)}
.ccy-sym.wbull{color:var(--yel)}
.ccy-sym.neut,.ccy-sym.noedge{color:var(--tx2)}
.ccy-sym.wbear{color:var(--amb)}
.ccy-sym.bear,.ccy-sym.sbear{color:var(--red)}
.ccy-pct{font-family:var(--mono);font-size:10px;color:var(--tx2);margin-top:2px}
.ccy-score{font-family:var(--mono);font-size:28px;font-weight:600;line-height:1}
.ccy-score.pos{color:var(--grn)}.ccy-score.neg{color:var(--red)}.ccy-score.zer{color:var(--tx2)}
.bias-row{display:flex;align-items:center;margin-bottom:8px}
.bias-badge{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;letter-spacing:.03em}
.bb-sbull,.bb-bull{background:var(--gbg);color:var(--grn);border:1px solid var(--gbd)}
.bb-wbull{background:var(--ybg);color:var(--yel);border:1px solid var(--ybd)}
.bb-neut,.bb-noedge{background:var(--bg4);color:var(--tx2);border:1px solid var(--bd2)}
.bb-wbear{background:var(--abg);color:var(--amb);border:1px solid var(--abd)}
.bb-bear,.bb-sbear{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.strength-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.str-label{font-family:var(--mono);font-size:9px;color:var(--tx2);letter-spacing:.06em;width:52px}
.str-blocks{display:flex;gap:2px}
.str-block{width:10px;height:10px;border-radius:2px;background:var(--bg4);border:1px solid var(--bd2)}
.str-block.f-grn{background:var(--grn);border-color:var(--grn)}
.str-block.f-amb{background:var(--amb);border-color:var(--amb)}
.str-block.f-red{background:var(--red);border-color:var(--red)}
.str-pct{font-family:var(--mono);font-size:10px;font-weight:600}
.badges{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.bdg{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 6px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase}
.bdg-xbull{background:rgba(0,212,160,.13);color:#00ffcc;border:1px solid rgba(0,255,200,.25)}
.bdg-xbear{background:rgba(255,64,96,.13);color:#ff9090;border:1px solid rgba(255,80,80,.25)}
.bdg-blu{background:var(--bbg);color:var(--blu);border:1px solid rgba(74,158,255,.2)}
.bdg-conf{background:var(--abg);color:var(--amb);border:1px solid var(--abd);cursor:pointer}
.conf-row{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.conf-lbl{font-family:var(--mono);font-size:9px;color:var(--tx2);letter-spacing:.06em}
.conf-track{flex:1;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}
.cf-hi{background:var(--grn)}.cf-mid{background:var(--amb)}.cf-lo{background:var(--red)}
.conf-num{font-family:var(--mono);font-size:10px;font-weight:600}
.cn-hi{color:var(--grn)}.cn-mid{color:var(--amb)}.cn-lo{color:var(--red)}
.factors{border-top:1px solid var(--bd);padding-top:8px;display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.frow{display:flex;justify-content:space-between;align-items:center}
.fn{font-family:var(--mono);font-size:10px;color:var(--tx2)}
.fv{font-family:var(--mono);font-size:11px;font-weight:600}
.fv.p{color:var(--grn)}.fv.n{color:var(--red)}.fv.z{color:var(--tx3)}
.why-note{font-size:10px;color:var(--tx2);border-top:1px solid var(--bd);padding-top:8px;line-height:1.5;font-style:italic}
.why-note.conflict-note{color:var(--amb)}
.tbl-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{padding:8px 12px;text-align:left;font-family:var(--mono);font-size:9px;font-weight:500;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--bd);font-family:var(--mono);font-size:11px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
.t-pos{color:var(--grn);font-weight:600}.t-neg{color:var(--red);font-weight:600}
.t-amb{color:var(--amb)}.t-dim{color:var(--tx2)}
.spk-track{width:70px;height:4px;background:var(--bg4);border-radius:2px;position:relative;overflow:hidden}
.spk-pos{position:absolute;left:50%;height:100%;background:var(--grn);border-radius:2px}
.spk-neg{position:absolute;right:50%;height:100%;background:var(--red);border-radius:2px}
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--abd);border-radius:10px;padding:24px 26px;max-width:420px;width:90%;position:relative;animation:fadeUp .2s ease both}
.modal-close{position:absolute;top:12px;right:14px;font-family:var(--mono);font-size:16px;color:var(--tx2);cursor:pointer;background:none;border:none;line-height:1}
.modal-close:hover{color:var(--tx)}
.modal-title{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--amb);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.modal-ccy{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--amb);margin-bottom:12px}
.modal-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:6px;margin-bottom:8px}
.modal-row-label{font-family:var(--mono);font-size:9px;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.modal-row-val{font-family:var(--mono);font-size:14px;font-weight:600}
.modal-row-val.bull{color:var(--grn)}.modal-row-val.bear{color:var(--red)}
.modal-row-icon{font-size:22px}
.modal-divider{text-align:center;font-family:var(--mono);font-size:18px;color:var(--amb);margin:4px 0 12px}
.modal-explain{font-size:11px;color:var(--tx2);line-height:1.6;border-top:1px solid var(--bd);padding-top:12px;margin-top:4px}
.modal-explain strong{color:var(--tx);font-weight:500}
.modal-penalty{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--amb);background:var(--abg);border:1px solid var(--abd);padding:3px 10px;border-radius:4px;margin-top:10px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tab-nav{display:flex;gap:2px;background:var(--bg3);border-bottom:1px solid var(--bd);padding:0 24px}
.tab-btn{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--tx2);padding:10px 18px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.04em;transition:all .15s}
.tab-btn:hover{color:var(--tx)}
.tab-btn.active{color:var(--grn);border-bottom-color:var(--grn)}
.tab-pane{display:none}.tab-pane.active{display:block}
.hm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1100px){.hm-grid{grid-template-columns:repeat(2,1fr)}}
.hm-card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:14px;position:relative;overflow:hidden}
.hm-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.hm-card.c-sbull::after,.hm-card.c-bull::after{background:var(--grn)}
.hm-card.c-wbull::after{background:var(--yel)}
.hm-card.c-neut::after{background:var(--tx3)}
.hm-card.c-wbear::after,.hm-card.c-bear::after{background:var(--amb)}
.hm-card.c-sbear::after{background:var(--red)}
.hm-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.hm-ccy{font-family:var(--mono);font-size:22px;font-weight:600}
.hm-ccy.sbull,.hm-ccy.bull{color:var(--grn)}
.hm-ccy.wbull{color:var(--yel)}
.hm-ccy.neut{color:var(--tx2)}
.hm-ccy.wbear,.hm-ccy.bear{color:var(--amb)}
.hm-ccy.sbear{color:var(--red)}
.hm-pct{font-family:var(--mono);font-size:28px;font-weight:600}
.hm-pct.pos{color:var(--grn)}.hm-pct.neg{color:var(--red)}.hm-pct.zer{color:var(--tx2)}
.hm-gauge{width:100%;height:6px;background:var(--bg4);border-radius:3px;margin:6px 0 10px;overflow:hidden}
.hm-gauge-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--amb) 40%,var(--yel) 50%,var(--grn))}
.hm-indicators{display:flex;flex-direction:column;gap:3px;border-top:1px solid var(--bd);padding-top:8px}
.hm-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.hm-name{font-family:var(--mono);font-size:9px;color:var(--tx2);letter-spacing:.04em}
.hm-sig{font-family:var(--mono);font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px}
.hm-sig.bullish{background:var(--gbg);color:var(--grn);border:1px solid var(--gbd)}
.hm-sig.bearish{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.hm-sig.neutral{background:var(--bg4);color:var(--tx3);border:1px solid var(--bd)}
.hm-high{font-weight:700;color:var(--tx)}
.hm-source{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-top:10px;text-align:right}
.hm-no-data{color:var(--tx2);font-size:11px;padding:20px;text-align:center}
</style>
</head>
<body>
<script>
// ══════════════════════════════════════════════════════════
// DATA — cotBull uklonjen, sve se računa iz deltaPct6w
// ══════════════════════════════════════════════════════════
const DATA = {
  currencies: {
    USD: { longPct:61.6, longPct6wAgo:49.0, deltaPct6w:13,  dLong:3098,   dShort:3367,  heatmap:100, tqConsistent:6 },
    EUR: { longPct:53.3, longPct6wAgo:55.0, deltaPct6w:-2,  dLong:-19327, dShort:23522, heatmap:33,  tqConsistent:3 },
    GBP: { longPct:21.8, longPct6wAgo:40.0, deltaPct6w:-18, dLong:-1271,  dShort:32863, heatmap:40,  tqConsistent:6 },
    JPY: { longPct:30.4, longPct6wAgo:33.0, deltaPct6w:-3,  dLong:-3677,  dShort:-7705, heatmap:100, tqConsistent:3 },
    CHF: { longPct:14.0, longPct6wAgo:18.0, deltaPct6w:-4,  dLong:381,    dShort:1417,  heatmap:71,  tqConsistent:3 },
    CAD: { longPct:17.5, longPct6wAgo:30.0, deltaPct6w:-13, dLong:-257,   dShort:13634, heatmap:71,  tqConsistent:6 },
    AUD: { longPct:46.3, longPct6wAgo:69.0, deltaPct6w:-23, dLong:-2142,  dShort:6745,  heatmap:40,  tqConsistent:6 },
    NZD: { longPct:15.3, longPct6wAgo:20.0, deltaPct6w:-5,  dLong:2848,   dShort:12531, heatmap:57,  tqConsistent:4 },
    XAU: { longPct:85.9, longPct6wAgo:87.3, deltaPct6w:-1,  dLong:5901,   dShort:4782,  heatmap:null, tqConsistent:5 },
  },
  pairs: [
    // USD majori
    {base:'EUR',quote:'USD'},{base:'GBP',quote:'USD'},{base:'AUD',quote:'USD'},
    {base:'NZD',quote:'USD'},{base:'USD',quote:'JPY'},{base:'USD',quote:'CAD'},
    {base:'USD',quote:'CHF'},
    // JPY crossovi
    {base:'EUR',quote:'JPY'},{base:'GBP',quote:'JPY'},{base:'AUD',quote:'JPY'},
    {base:'NZD',quote:'JPY'},{base:'CAD',quote:'JPY'},{base:'CHF',quote:'JPY'},
    // EUR crossovi
    {base:'EUR',quote:'GBP'},{base:'EUR',quote:'CHF'},{base:'EUR',quote:'AUD'},
    {base:'EUR',quote:'CAD'},{base:'EUR',quote:'NZD'},
    // GBP crossovi
    {base:'GBP',quote:'AUD'},{base:'GBP',quote:'CHF'},{base:'GBP',quote:'CAD'},
    {base:'GBP',quote:'NZD'},
    // Ostali crossovi
    {base:'AUD',quote:'NZD'},{base:'AUD',quote:'CAD'},{base:'AUD',quote:'CHF'},
    {base:'NZD',quote:'CAD'},{base:'NZD',quote:'CHF'},{base:'CAD',quote:'CHF'},
    // Metali
    {base:'XAU',quote:'USD'},
  ],
};

// ══════════════════════════════════════════════════════════
// NEWS IMPULSE — ucitava se iz news.json (generise ga update_news.py)
// Python vec racuna surprise/threshold/decay i upisuje gotov 'impulse'.
// cme.html samo cita i sabira po valuti — cme.html se NIKAD ne menja.
// ══════════════════════════════════════════════════════════
let NEWS_DATA = { news: [], generatedAt: null }; // popunjava loadNewsJson()

// Status učitavanja svakog izvora — snapshot se pravi SAMO ako su
// obavezni izvori (heatmap + cot) uspešno učitani. Sprečava nepotpun snapshot.
let LOAD_STATUS = { news: false, heatmap: false, cot: false, gold: false };

// Verzije za istorijski kontekst — ako se promeni algoritam Final Bias/News/
// stari snapshoti ostaju obeleženi verzijom po kojoj su napravljeni.
const SNAPSHOT_VERSION = "1.0";
const CME_ENGINE_VERSION = "3.1.0";  // V3.1: Retail uklonjen iz score-a (V3.0 = Float score)
const CME_BUILD = "2026-07-12";

// ══════════════════════════════════════════════════════════
// JSON DATA LOADERS — svi rade preko localhost servera (run_cme.bat)
// Buduce prosirenje: ista sema za loadCotJson(), loadHeatmapJson()
// kad COT/Heatmap takodje budu automatizovani.
// ══════════════════════════════════════════════════════════
async function loadNewsJson(){
  const statusEl = document.getElementById('news-status');
  try {
    const res = await fetch('news.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('news.json not found');
    NEWS_DATA = await res.json();
    LOAD_STATUS.news = true;
    console.log(`[news] Loaded ${NEWS_DATA.news.length} items, generated ${NEWS_DATA.generatedAt}`);
    if (statusEl) {
      const ts = NEWS_DATA.generatedAt ? new Date(NEWS_DATA.generatedAt).toLocaleString(t('dateLocale'), {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
      statusEl.textContent = `📰 ${NEWS_DATA.news.length} (${ts})`;
    }
  } catch (e) {
    console.warn('[news] Could not load news.json — News Impulse disabled.', e.message);
    NEWS_DATA = { news: [], generatedAt: null };
    if (statusEl) statusEl.textContent = '📰 N/A (run_cme.bat)';
  }
}

function newsImpulseForCcy(ccy){
  let total = 0;
  const contributions = [];
  for (const item of NEWS_DATA.news){
    if (item.ccy !== ccy) continue;
    const pts = item.impulse; // vec izracunat sa decay-om u Python skripti
    if (!pts) continue;
    total += pts;
    contributions.push({ item, pts });
  }
  total = Math.max(-15, Math.min(15, Math.round(total)));
  return { total, contributions };
}

// ══════════════════════════════════════════════════════════
// SCORING ENGINE — Institution-First
// COT određuje smer. Heatmap potvrđuje ili upozorava.
// Conflict ide u Confidence, ne u Score.
// ══════════════════════════════════════════════════════════
function scoreCOT(delta) {
  return Math.max(-40, Math.min(40, delta * 2));
}
function scoreTQ(consistent, delta) {
  const dir = delta >= 0 ? 1 : -1;
  const b = consistent>=6?5:consistent>=5?4:consistent>=4?3:consistent>=3?1:0;
  return dir * b;
}
function scoreWeekly(dL, dS, delta) {
  const net = dL - dS;
  const weeklyDir = net >= 0 ? 1 : -1;
  const total = Math.abs(dL) + Math.abs(dS);
  if (total < 1000) return 0;
  const pts = total >= 10000 ? 30 : total >= 5000 ? 20 : 10;
  const cotDir = delta >= 0 ? 1 : -1;
  return weeklyDir === cotDir ? weeklyDir * pts : weeklyDir * Math.min(pts, 10);
}
function scoreHeatmap(hm, delta) {
  // hm === null znaci nema Heatmap (npr. Gold) — faktor doprinosi 0, rezervisano za buduci Gold Macro Score
  if (hm === null || hm === undefined) return 0;
  // aligned → pun doprinos (±20)
  // mild conflict (55-70% protiv COT) → max ±10
  // strong conflict (>70% protiv COT) → max ±5
  const raw = hm>=90?20:hm>=75?15:hm>=60?10:hm>=50?5:hm>=40?-5:hm>=25?-10:hm>=10?-15:-20;
  const cotBull = delta >= 0;
  const hmBull  = hm >= 50;
  if (cotBull === hmBull) return raw; // aligned
  const cl = conflictLevel(hm, delta);
  const cap = cl === 'strong' ? 5 : cl === 'mild' ? 10 : Math.abs(raw);
  return Math.sign(raw) * Math.min(cap, Math.abs(raw));
}
function conflictLevel(hm, delta) {
  if (hm === null || hm === undefined) return 'none'; // nema Heatmap, nema konflikta po definiciji
  const cotBull = delta >= 0;
  if (!cotBull && hm > 70) return 'strong';
  if ( cotBull && hm < 30) return 'strong';
  if (!cotBull && hm >= 55) return 'mild';
  if ( cotBull && hm <= 45) return 'mild';
  return 'none';
}
function calcConf(consistent, hm, delta, dL, dS) {
  let c = 100;
  const cl = conflictLevel(hm, delta);
  if (cl === 'strong') c -= 25;
  else if (cl === 'mild') c -= 15;
  if (consistent <= 2) c -= 15;
  else if (consistent <= 3) c -= 10;
  else if (consistent <= 4) c -= 5;
  const weeklyDir = (dL - dS) >= 0 ? 1 : -1;
  const cotDir    = delta >= 0 ? 1 : -1;
  if (weeklyDir !== cotDir) c -= 10;
  return Math.max(30, c);
}
function calcCcy(ccy, d) {
  const delta  = d.deltaPct6w;
  const cotMom = scoreCOT(delta);
  const tq     = scoreTQ(d.tqConsistent, delta);
  const weekly = scoreWeekly(d.dLong, d.dShort, delta);
  const hm     = scoreHeatmap(d.heatmap, delta);
  const baseScore = cotMom + tq + weekly + hm; // score BEZ news impulsa — ovo definise bazni bias

  // News Impulse — privremeni bonus/penal, NIKAD ne sme samostalno da preokrene bias
  const newsRaw = newsImpulseForCcy(ccy);
  let news = newsRaw.total;
  const baseBias = biasKey(baseScore);
  let testScore = baseScore + news;
  let testBias = biasKey(testScore);
  // Safety: ako bi news preokrenuo iz bull strane u bear stranu (ili obrnuto), cap-uj ga
  const baseSide = baseScore >= 0 ? 1 : -1;
  const testSide = testScore >= 0 ? 1 : -1;
  if (baseSide !== testSide && baseScore !== 0) {
    // Cap news tako da score ostane na istoj strani, minimum 1 poen unutra
    news = baseScore > 0 ? -(baseScore - 1) : (Math.abs(baseScore) - 1);
    news = Math.max(-15, Math.min(15, news));
  }
  // Dodatni safety: ne dozvoli skok preko 2 nivoa bias skale (npr. Strong Bear -> Strong Bull)
  const BIAS_ORDER = ['sbear','wbear','neut','wbull','sbull'];
  const baseBiasIdx = BIAS_ORDER.indexOf(baseBias);
  let finalScore = baseScore + news;
  let finalBias = biasKey(finalScore);
  let finalBiasIdx = BIAS_ORDER.indexOf(finalBias);
  if (Math.abs(finalBiasIdx - baseBiasIdx) > 2) {
    const dir = finalBiasIdx > baseBiasIdx ? 1 : -1;
    const cappedIdx = baseBiasIdx + dir * 2;
    const cappedBias = BIAS_ORDER[Math.max(0, Math.min(4, cappedIdx))];
    // Re-cap news da score ostane unutar cappedBias granice
    const biasRanges = { sbear:[-105,-85], wbear:[-84,-20], neut:[-19,19], wbull:[20,84], sbull:[85,105] };
    const [lo, hi] = biasRanges[cappedBias];
    finalScore = Math.max(lo, Math.min(hi, finalScore));
    news = finalScore - baseScore;
  }

  const score = baseScore + news;
  const cl     = conflictLevel(d.heatmap, delta);
  const conf   = calcConf(d.tqConsistent, d.heatmap, delta, d.dLong, d.dShort);
  const penalty = cl === 'strong' ? -10 : cl === 'mild' ? -5 : 0; // samo za prikaz badge-a
  const rotation = Math.abs(d.dLong)>=1000 && Math.abs(d.dShort)>=1000
                   && Math.sign(d.dLong) !== Math.sign(d.dShort);
  return { cotMom, tq, weekly, hm, news, newsContrib: newsRaw.contributions,
           baseScore, penalty, score, conf,
           rotation, xBull: d.longPct>85, xBear: d.longPct<15, bull: score>=0 };
}

// ══════════════════════════════════════════════════════════
// BIAS SYSTEM — pair bias direktno iz Pair Score
// ══════════════════════════════════════════════════════════
function biasKey(score) {
  if (score >= 85)  return 'sbull';
  if (score >= 60)  return 'bull';
  if (score >= 20)  return 'wbull';
  if (score >  -20) return 'neut';
  if (score >= -60) return 'wbear';
  if (score >= -85) return 'bear';
  return 'sbear';
}
function pairBiasKey(ps) {
  if (ps >  100) return 'sbull';
  if (ps >   60) return 'bull';
  if (ps >   20) return 'wbull';
  if (ps >= -20) return 'noedge';
  if (ps >= -60) return 'wbear';
  if (ps >= -100) return 'bear';
  return 'sbear';
}
function pairConf(bs, qs) {
  // Konflikt je već uračunat u currency conf (calcConf), izbegavamo duplo kažnjavanje
  let c = Math.round((bs.conf + qs.conf) / 2);
  if (bs.tq===0 && qs.tq===0) c -= 12;
  else if (bs.tq===0 || qs.tq===0) c -= 7;
  const ps = bs.score - qs.score;
  if (Math.abs(ps) < 30) c -= 25; // mali spread → nema edge
  return Math.max(30, Math.min(100, c));
}
function qualityLabel(ps, pc) {
  const s = Math.abs(ps);
  if (s > 140 && pc >= 85) return 'elite';
  if (s > 100 && pc >= 75) return 'high';
  if (s > 60  && pc >= 65) return 'good';
  if (s > 30)              return 'moderate';
  return 'watch';
}
const QUALITY_ORDER = ['watch','moderate','good','high','elite'];
function downgradeQuality(key) {
  const idx = QUALITY_ORDER.indexOf(key);
  return QUALITY_ORDER[Math.max(0, idx - 1)];
}

function conflictReason(ccy, d){
  const cotBull = d.deltaPct6w >= 0;
  const hmBull  = d.heatmap >= 55;

}

function cotDescription(d){
  // Opisna rečenica o tome šta institucije rade — dosledna svuda
  const delta = d.deltaPct6w;
  const dL = d.dLong, dS = d.dShort;
  const absDelta = Math.abs(delta);
  const bull = delta >= 0;
  const rotation = Math.abs(dL)>=1000 && Math.abs(dS)>=1000 && Math.sign(dL)!==Math.sign(dS);
  // Weekly smer u odnosu na 6w trend
  const weeklyNet = dL - dS;
  const weeklyDir = weeklyNet >= 0 ? 1 : -1;
  const cotDir = bull ? 1 : -1;
  const inflection = weeklyDir !== cotDir && Math.abs(dL)+Math.abs(dS) >= 1000;

  if (lang === 'sr') {
    if (inflection) {
      return bull
        ? `Long pozicije rastu uz delimično zatvaranje longova ove nedelje — moguća rotacija.`
        : `Long pozicije opadaju uz zatvaranje shortova ove nedelje — moguća rotacija.`;
    }
    if (rotation) {
      return bull
        ? `Institucije aktivno grade long pozicije i istovremeno zatvaraju short — dvostrana rotacija u bull smeru.`
        : `Institucije aktivno zatvaraju long pozicije i istovremeno grade short — dvostrana rotacija u bear smeru.`;
    }
    if (absDelta >= 15) {
      return bull
        ? `Institucije agresivno povećavaju long pozicije.`
        : `Institucije agresivno smanjuju long pozicije.`;
    }
    if (absDelta >= 5) {
      return bull
        ? `Institucije postepeno povećavaju long pozicije.`
        : `Institucije postepeno smanjuju long pozicije.`;
    }
    return bull
      ? `Long pozicije blago rastu, bez jasnog ubrzanja.`
      : `Long pozicije blago opadaju, bez jasnog ubrzanja.`;
  } else {
    if (inflection) {
      return bull
        ? `Long positions rising while some longs are being closed this week — possible rotation.`
        : `Long positions falling while shorts are being closed this week — possible rotation.`;
    }
    if (rotation) {
      return bull
        ? `Institutions are actively building longs while closing shorts — two-sided rotation to the bull side.`
        : `Institutions are actively closing longs while building shorts — two-sided rotation to the bear side.`;
    }
    if (absDelta >= 15) {
      return bull
        ? `Institutions are aggressively increasing long positions.`
        : `Institutions are aggressively reducing long positions.`;
    }
    if (absDelta >= 5) {
      return bull
        ? `Institutions are gradually increasing long positions.`
        : `Institutions are gradually reducing long positions.`;
    }
    return bull
      ? `Long positions edging up, no clear acceleration.`
      : `Long positions edging down, no clear acceleration.`;
  }
}

function newsChangedBias(s){
  // Detektuje da li je News Impulse promenio Bias u odnosu na baseScore
  if (!s.news || s.news === 0) return null;
  const baseBk = biasKey(s.baseScore);
  const finalBk = biasKey(s.score);
  if (baseBk === finalBk) return null; // isti Bias, vest nije promenila smer
  // Odredjuje smer promene
  const BIAS_ORDER = ['sbear','wbear','neut','wbull','sbull'];
  const baseIdx = BIAS_ORDER.indexOf(baseBk);
  const finalIdx = BIAS_ORDER.indexOf(finalBk);
  return finalIdx > baseIdx ? 'bull' : 'bear'; // bull = vest poboljsala Bias, bear = pogorsala
}

function newsContribDesc(contributions){
  if (!contributions || !contributions.length) return '';
  return contributions.map(c=>{
    const item = c.item;
    const sign = c.pts > 0 ? '+' : '';
    const dayLabel = item.daysAgo===0 ? (lang==='sr'?'danas':'today') : (lang==='sr'?`pre ${item.daysAgo}d`:`${item.daysAgo}d ago`);
    const dateStr = item.date ? new Date(item.date).toLocaleDateString(t('dateLocale'), {day:'2-digit',month:'2-digit',year:'numeric'}) : '';
    const dateLabel = dateStr ? `${dayLabel}, ${dateStr}` : dayLabel;
    const eventLabel = item.eventName ? ` — ${item.eventName}` : '';
    return `${item.type}${eventLabel} ${item.actual} vs ${item.forecast??item.previous} (${dateLabel}, ${sign}${c.pts})`;
  }).join(' · ');
}

// ══════════════════════════════════════════════════════════
// AUTO-NOTE — zakljucak na dnu kartice, sklopljen iz podataka.
// Zamenjuje rucno pisane note_sr/note_en koji su bili zamrznuti
// u vremenu dok se sve oko njih azuriralo.
// Ne ponavlja redove iznad (cotDescription vec opisuje sta institucije
// rade) — ovo je "pa sta onda": poravnanje / konflikt + najbitniji kontekst.
// Isti princip kao Gold narativ: deterministicki, bez API troska.
// ══════════════════════════════════════════════════════════
function buildNote(ccy, d, s){
  const sr = lang === 'sr';
  const parts = [];
  const cl = conflictLevel(d.heatmap, d.deltaPct6w);
  const cotBull = d.deltaPct6w >= 0;

  // ── Klauza 1: naslov — konflikt ima prioritet, pa poravnanje ──
  if (cl !== 'none') {
    const cotStr = cotBull ? t('bullish') : t('bearish');
    const hmStr  = d.heatmap >= 55 ? t('bullish') : t('bearish');
    const lvl = cl === 'strong' ? (sr?'Jak':'Strong') : (sr?'Blag':'Mild');
    const drop = cl === 'strong' ? 25 : 15;
    parts.push(sr
      ? `${lvl} konflikt: COT ${cotStr} vs Heatmap ${hmStr} (${d.heatmap}%). Confidence −${drop}%.`
      : `${lvl} conflict: COT ${cotStr} vs Heatmap ${hmStr} (${d.heatmap}%). Confidence −${drop}%.`);
  } else {
    const dirs = [s.cotMom, s.weekly, s.hm].filter(x => x !== 0).map(Math.sign);
    const allSame = dirs.length >= 2 && dirs.every(x => x === dirs[0]);
    if (allSame) {
      const bull = dirs[0] > 0;
      parts.push(sr
        ? `COT, Weekly i Heatmap poravnati — čist ${bull?'bullish':'bearish'} signal.`
        : `COT, Weekly and Heatmap aligned — clean ${bull?'bullish':'bearish'} signal.`);
    } else if (dirs.length === 0) {
      parts.push(sr ? 'Nema jasnog signala — svi faktori neutralni.'
                    : 'No clear signal — all factors neutral.');
    } else {
      parts.push(sr ? 'Faktori mešoviti, bez jasnog poravnanja.'
                    : 'Factors mixed, no clear alignment.');
    }
  }

  // ── Klauza 2: najbitniji kontekst (samo jedan) ──
  const netWeekly = d.dLong - d.dShort;
  if (d.longPct >= 80 || d.longPct <= 20) {
    parts.push(sr ? `COT na ekstremu (${d.longPct}% long).`
                  : `COT at an extreme (${d.longPct}% long).`);
  } else if (Math.abs(d.deltaPct6w) >= 15) {
    parts.push(sr ? `${d.longPct6wAgo}%→${d.longPct}% za 6 nedelja — trend u toku.`
                  : `${d.longPct6wAgo}%→${d.longPct}% over 6 weeks — trend in motion.`);
  } else if (Math.abs(netWeekly) >= 20000) {
    const k = Math.round(netWeekly/1000);
    parts.push(sr ? `${fmt(k)}K neto ove nedelje — institucije ubrzavaju.`
                  : `${fmt(k)}K net this week — institutions accelerating.`);
  }

  // ── Klauza 3: vest koja je promenila bias ──
  if (newsChangedBias(s)) {
    parts.push(sr ? 'Vest promenila bias.' : 'News shifted the bias.');
  }
  return parts.join(' ');
}

// ── Percentil neto pozicije (3g). INFORMATIVNO — ne ulazi u score. ──
// Ekstremi (>95 / <5) su u testu 12.jul pokazali ~58-59% kontrarian edge kod
// sva tri modela (2.5-2.9σ), ali percentil NIJE prosao walk-forward proveru —
// isti prag koji je odbacio okretanje znaka COT-a. Zato: prikaz, ne bodovanje.
function pctBadge(d){
  if(d.percentile3y==null) return '';
  const p=d.percentile3y;
  const extreme = p>=95 || p<=5;
  const col = extreme ? 'var(--amb)' : 'var(--tx3)';
  const tip = extreme
    ? (lang==='sr' ? `Neto pozicija na ekstremu — ${p}. percentil poslednje 3 godine`
                   : `Net position at an extreme — ${p}th percentile of the last 3 years`)
    : (lang==='sr' ? `${p}. percentil neto pozicije (3 godine)`
                   : `${p}th percentile of net position (3 years)`);
  return ` · <span style="color:${col}${extreme?';font-weight:600':''}" title="${tip}">p${p}${extreme?'⚠':''}</span>`;
}

// ── LF vs AM divergencija. INFORMATIVNO — ne ulazi u score. ──
// Legacy Non-Commercial sabija Leveraged Funds i Asset Managers u jedan broj
// iako cesto stoje na suprotnim stranama. Ovo to razotkriva.
function lfAmLine(d){
  const x=d.lfAmDivergence, m=d.cotModels;
  if(!x || !m || !m.levFunds || !m.assetMgr) return '';
  const lf=m.levFunds, am=m.assetMgr;
  const sr=lang==='sr';
  const head = x.opposed
    ? `<span style="color:var(--amb);font-weight:600">⚔ ${sr?'brzi vs spori novac':'fast vs slow money'}</span>`
    : `${sr?'brzi i spori novac slozni':'fast and slow money agree'}`;
  return `<div style="font-size:9px;color:var(--tx2);margin:-1px 0 3px;font-style:italic">↳ ${head}: `
       + `LF ${lf.longPct}% (${fmt(lf.deltaPct6w)}pp) · AM ${am.longPct}% (${fmt(am.deltaPct6w)}pp)</div>`;
}

function buildPairResults(scores){
  return DATA.pairs.map(p=>{
    const bs=scores[p.base],qs=scores[p.quote];
    if(!bs||!qs)return null;
    const ps=bs.score-qs.score,pc=pairConf(bs,qs);
    const pbk=pairBiasKey(ps);
    const bothConflict=bs.penalty<=-5&&qs.penalty<=-5; // obe valute imaju Conflict badge (blagi ili jak)
    return{...p,display:p.base+p.quote,ps,pc,bs,qs,pbk,bothConflict};
  }).filter(Boolean).sort((a,b)=>Math.abs(b.ps)-Math.abs(a.ps));
}

function renderPairs(scores){
  // Top Setups = SAMO najčistiji setupovi. Isključi par ako BILO KOJA
  // valuta ima konflikt (COT vs Heatmap), bez obzira na spread. Konflikt-parovi
  // se vide u "Svi Parovi" sa upozorenjem i sniženim kvalitetom.
  const all=buildPairResults(scores).filter(p=>{
    if(p.pbk==='noedge') return false;
    const bsC=p.bs.penalty<=-5, qsC=p.qs.penalty<=-5;
    if(bsC||qsC) return false;  // bilo koji konflikt → van Top Setups
    return true;
  });
  const topClean = all.slice(0,6);

  if(!topClean.length)return`<div style="color:var(--tx2);font-size:11px;padding:10px">${t('noSetups')}</div>`;

  const rows=topClean.map((p,i)=>{
    const cf=cfCls(p.pc);const isLong=p.ps>0;
    const spread=Math.abs(p.ps);
    // Top Setups su sada bez konflikta po definiciji (filtrirani gore).
    const qlKey=qualityLabel(p.ps,p.pc);
    const qlStr=t('qualityLabel')[qlKey];
    const qlCls=qlKey==='elite'||qlKey==='high'?'t-pos':qlKey==='moderate'||qlKey==='watch'?'t-dim':'';
    const cNote='', cReason='', cDesc='';
    // News Impulse uticaj na par
    const bsNews = p.bs.newsContrib && p.bs.newsContrib.length ? p.bs.newsContrib : null;
    const qsNews = p.qs.newsContrib && p.qs.newsContrib.length ? p.qs.newsContrib : null;
    let newsNote = '';
    const bsBiasChange = newsChangedBias(p.bs);
    const qsBiasChange = newsChangedBias(p.qs);
    if (bsBiasChange) { const arrow=bsBiasChange==='bear'?'↓':'↑'; newsNote+=`<br><span class="${bsBiasChange==='bear'?'news-alert-bear':'news-alert-bull'}">⚡ ${p.base} BIAS ${arrow}</span>`; }
    if (qsBiasChange) { const arrow=qsBiasChange==='bear'?'↓':'↑'; newsNote+=`<br><span class="${qsBiasChange==='bear'?'news-alert-bear':'news-alert-bull'}">⚡ ${p.quote} BIAS ${arrow}</span>`; }
    if (bsNews) bsNews.forEach(c => { const sign=c.pts>0?'+':''; newsNote+=`<br><span style="color:var(--blu);font-size:9px">📰 ${p.base}: ${c.item.eventName||c.item.type} → ${sign}${c.pts}</span>`; });
    if (qsNews) qsNews.forEach(c => { const sign=c.pts>0?'+':''; newsNote+=`<br><span style="color:var(--blu);font-size:9px">📰 ${p.quote}: ${c.item.eventName||c.item.type} → ${sign}${c.pts}</span>`; });
    return`<tr style="cursor:pointer" onclick="showPairDetail('${p.display}')">
      <td class="t-dim" style="font-size:10px">${i+1}</td>
      <td style="font-weight:600;font-size:13px;color:${isLong?'var(--grn)':'var(--red)'}">${p.display}</td>
      <td style="font-size:11px;color:${isLong?'var(--grn)':'var(--red)'}">${t('biasLabel')[p.pbk]}</td>
      <td style="font-weight:600;font-size:13px;color:${isLong?'var(--grn)':'var(--red)'}">${spread}</td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <div class="conf-track" style="width:60px"><div class="conf-fill cf-${cf}" style="width:${p.pc}%"></div></div>
        <span class="conf-num cn-${cf}">${p.pc}%</span></div></td>
      <td class="${qlCls}" style="font-size:11px;font-weight:500">${qlStr}${cNote?`<br><span style="color:var(--amb);font-size:9px">${cNote}</span><br><span style="color:var(--tx2);font-size:8px">↳ ${cReason}</span><br><span style="color:var(--tx2);font-size:8px;font-style:italic">↳ ${cDesc}</span>`:''}${newsNote}</td>
    </tr>`;
  }).join('');

  return`<div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>${t('thPair')}</th><th>Bias</th><th>${t('thSpread')}</th><th>Confidence</th><th>${t('thQuality')}</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function renderTable(scores){
  const all=buildPairResults(scores);
  return all.map((p,i)=>{
    const cf=cfCls(p.pc);
    const bias=p.ps>20?t('bLong'):p.ps<-20?t('bShort'):t('bNeutral');
    const biasCls=p.ps>20?'t-pos':p.ps<-20?'t-neg':'t-dim';
    const w=Math.min(46,Math.abs(p.ps)/4);
    const barHtml=p.ps>=0?`<div class="spk-pos" style="width:${w}%"></div>`:`<div class="spk-neg" style="width:${w}%"></div>`;
    let qual;
    // Conflict logika: samo na valuti koja pravi problem, ne na paru
    const bsConflict = p.bs.penalty <= -5;
    const qsConflict = p.qs.penalty <= -5;
    let conflictNote = '';
    let conflictReasonTxt = '';
    let conflictDescTxt = '';
    if (bsConflict && qsConflict) {
      conflictNote = `⚠ ${p.base} & ${p.quote} Conflict`;
      conflictReasonTxt = `${p.base}: ${conflictReason(p.base,DATA.currencies[p.base])} · ${p.quote}: ${conflictReason(p.quote,DATA.currencies[p.quote])}`;
      conflictDescTxt = `${p.base}: ${cotDescription(DATA.currencies[p.base])} · ${p.quote}: ${cotDescription(DATA.currencies[p.quote])}`;
    } else if (bsConflict) {
      conflictNote = `⚠ ${p.base} Conflict`;
      conflictReasonTxt = conflictReason(p.base, DATA.currencies[p.base]);
      conflictDescTxt = cotDescription(DATA.currencies[p.base]);
    } else if (qsConflict) {
      conflictNote = `⚠ ${p.quote} Conflict`;
      conflictReasonTxt = conflictReason(p.quote, DATA.currencies[p.quote]);
      conflictDescTxt = cotDescription(DATA.currencies[p.quote]);
    }
    if (p.pbk === 'noedge') {
      qual = `<span class="t-dim">↔ No Edge</span>`;
    } else {
      const qlKey = qualityLabel(p.ps, p.pc);
      const qlCls = qlKey==='elite'||qlKey==='high' ? 't-pos' : qlKey==='moderate'||qlKey==='watch' ? 't-dim' : '';
      // Dva konflikta = AVOID (jasno označen, ali NE izbačen)
      if (bsConflict && qsConflict) {
        qual = `<span style="color:var(--red);font-weight:700;font-size:11px">❌ ${lang==='sr'?'IZBEGAVATI':'AVOID'}</span>`;
        qual += `<br><span style="color:var(--red);font-size:9px">⚠ ${p.base} & ${p.quote} ${lang==='sr'?'oba u konfliktu':'both in conflict'}</span>`;
        qual += `<br><span style="color:var(--tx2);font-size:8px">↳ ${conflictReasonTxt}</span>`;
      } else {
        qual = `<span class="${qlCls}" style="font-size:11px;font-weight:500">${t('qualityLabel')[qlKey]}</span>`;
        if (conflictNote) qual += `<br><span style="color:var(--amb);font-size:9px">${conflictNote}</span><br><span style="color:var(--tx2);font-size:8px">↳ ${conflictReasonTxt}</span><br><span style="color:var(--tx2);font-size:8px;font-style:italic">↳ ${conflictDescTxt}</span>`;
      }
      // News Impulse uticaj na par
      const bsNews = p.bs.newsContrib && p.bs.newsContrib.length ? p.bs.newsContrib : null;
      const qsNews = p.qs.newsContrib && p.qs.newsContrib.length ? p.qs.newsContrib : null;
      const bsBiasChange = newsChangedBias(p.bs);
      const qsBiasChange = newsChangedBias(p.qs);
      if (bsBiasChange) { const arrow=bsBiasChange==='bear'?'↓':'↑'; qual+=`<br><span class="${bsBiasChange==='bear'?'news-alert-bear':'news-alert-bull'}">⚡ ${p.base} BIAS ${arrow}</span>`; }
      if (qsBiasChange) { const arrow=qsBiasChange==='bear'?'↓':'↑'; qual+=`<br><span class="${qsBiasChange==='bear'?'news-alert-bear':'news-alert-bull'}">⚡ ${p.quote} BIAS ${arrow}</span>`; }
      if (bsNews) bsNews.forEach(c => {
        const sign = c.pts > 0 ? '+' : '';
        qual += `<br><span style="color:var(--blu);font-size:9px">📰 ${p.base}: ${c.item.eventName||c.item.type} → ${sign}${c.pts}</span>`;
      });
      if (qsNews) qsNews.forEach(c => {
        const sign = c.pts > 0 ? '+' : '';
        qual += `<br><span style="color:var(--blu);font-size:9px">📰 ${p.quote}: ${c.item.eventName||c.item.type} → ${sign}${c.pts}</span>`;
      });
    }
    return`<tr style="cursor:pointer" onclick="showPairDetail('${p.display}')">
      <td class="t-dim">${i+1}</td>
      <td style="font-weight:600">${p.display}</td>
      <td style="color:${p.bs.score>=0?'var(--grn)':'var(--red)'}">${fmt(p.bs.score)}</td>
      <td style="color:${p.qs.score>=0?'var(--grn)':'var(--red)'}">${fmt(p.qs.score)}</td>
      <td class="${p.ps>=0?'t-pos':'t-neg'}">${fmt(p.ps)}</td>
      <td><div class="spk-track">${barHtml}</div></td>
      <td><span class="cn-${cf}" style="font-family:var(--mono);font-size:10px;font-weight:600">${p.pc}%</span></td>
      <td class="${biasCls}" style="font-size:10px">${t('biasLabel')[p.pbk]||bias}</td>
      <td>${qual}</td>
    </tr>`;
  }).join('');
}

function renderDebug(scores){
  const ELITE=100, MAX_CCY=2;
  const ccyCount={};
  const selectedPairs=new Set();

  // Simulate diversification filter to track rejections
  const all = DATA.pairs.map(p => {
    const bs=scores[p.base], qs=scores[p.quote];
    if(!bs||!qs) return null;
    const ps=bs.score-qs.score, pc=pairConf(bs,qs);
    const pbk=pairBiasKey(ps);
    const bothConflict=bs.penalty<=-10&&qs.penalty<=-10;
    const bsC=bs.penalty<=-5, qsC=qs.penalty<=-5;
    const qlKey=qualityLabel(ps,pc);
    const cNote=bsC&&qsC?`⚠${p.base}&${p.quote}`:bsC?`⚠${p.base}`:qsC?`⚠${p.quote}`:'';
    return{base:p.base,quote:p.quote,display:p.base+p.quote,ps,pc,pbk,qlKey,bothConflict,cNote,bsC,qsC};
  }).filter(Boolean).sort((a,b)=>Math.abs(b.ps)-Math.abs(a.ps));

  // Run same filter as renderPairs and track why each pair is rejected
  const eligible = all.filter(p=>!p.bothConflict && p.pbk!=='noedge');
  for(const p of eligible){
    const spread=Math.abs(p.ps);
    const bc=ccyCount[p.base]||0, qc=ccyCount[p.quote]||0;
    const wouldExceed=bc>=MAX_CCY||qc>=MAX_CCY;
    if(spread>=ELITE||!wouldExceed){
      selectedPairs.add(p.display);
      ccyCount[p.base]=(bc+1);
      ccyCount[p.quote]=(qc+1);
      if(selectedPairs.size>=8) break;
    }
  }

  const rows=all.map((p,i)=>{
    const sc=p.ps>=0?'color:var(--grn)':'color:var(--red)';
    const cf=cfCls(p.pc);
    const spread=Math.abs(p.ps);
    let status, statusCls;
    if(selectedPairs.has(p.display)){
      status='✅ Prikazan'; statusCls='t-pos';
    } else if(p.pbk==='noedge'){
      status='❌ No Edge (spread <20)'; statusCls='t-dim';
    } else if(p.bothConflict){
      status=`❌ Oba u konfliktu`; statusCls='t-amb';
    } else {
      // Diversification rejection — which currency is saturated
      const bc=p.base, qc=p.quote;
      const reasons=[];
      // Count how many times each ccy appears in selected pairs
      let bCount=0, qCount=0;
      for(const sel of selectedPairs){
        if(sel.startsWith(bc)||sel.endsWith(bc)) bCount++;
        if(sel.startsWith(qc)||sel.endsWith(qc)) qCount++;
      }
      if(bCount>=MAX_CCY) reasons.push(`${bc} već ${bCount}x`);
      if(qCount>=MAX_CCY) reasons.push(`${qc} već ${qCount}x`);
      if(reasons.length) { status=`❌ Diversifikacija: ${reasons.join(', ')}`; statusCls='t-amb'; }
      else { status='⚠ Nije stigao (limit 8)'; statusCls='t-dim'; }
    }
    return`<tr>
      <td class="t-dim">${i+1}</td>
      <td style="font-weight:600">${p.display}</td>
      <td style="${sc};font-weight:600">${fmt(p.ps)}</td>
      <td><span class="cn-${cf}">${p.pc}%</span></td>
      <td style="font-size:10px">${t('qualityLabel')[p.qlKey]}</td>
      <td style="font-size:10px">${t('biasLabel')[p.pbk]}</td>
      <td class="${statusCls}" style="font-size:10px">${status}${p.cNote?` <span style="color:var(--amb)">${p.cNote}</span>`:''}</td>
    </tr>`;
  }).join('');
  return`<div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>Par</th><th>Pair Score</th><th>Conf</th><th>Quality</th><th>Bias</th><th>Status / Razlog</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

// ══════════════════════════════════════════════════════════
// COT JSON LOADER — cita engine/output/cot.json (CFTC auto)
// Prepisuje SAMO COT polja u DATA.currencies:
//   longPct, longPct6wAgo, deltaPct6w, dLong, dShort, tqConsistent
// Ostala polja u DATA bloku su fallback ako cot.json nedostaje.
// Ako cot.json ne postoji → fallback na rucni DATA blok (staro ponasanje).
// ══════════════════════════════════════════════════════════
let COT_META = { reportDate: null, applied: false };

async function loadCotJson(){
  const statusEl = document.getElementById('cot-status');
  try {
    const res = await fetch('engine/output/cot.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('cot.json not found');
    const data = await res.json();
    const cots = data.currencies || {};
    let applied = 0;
    for (const [ccy, c] of Object.entries(cots)) {
      const d = DATA.currencies[ccy];
      if (!d) continue; // valuta koju CME ne prati
      d.longPct      = c.longPct;
      d.longPct6wAgo = c.longPct6wAgo;
      d.deltaPct6w   = c.deltaPct6w;
      d.dLong        = c.dLong;
      d.dShort       = c.dShort;
      d.tqConsistent = c.tqConsistent;
      // ── Informativno: NE ulazi u score (odluka 12 jul — nije prosao
      //    walk-forward test, isti prag koji je odbacio okretanje znaka) ──
      d.netPosition    = c.netPosition;
      d.percentile3y   = c.percentile3y;
      d.cotModels      = c.models || null;         // legacy / levFunds / assetMgr
      d.lfAmDivergence = c.lfAmDivergence || null;
      applied++;
    }
    COT_META = { reportDate: data.reportDate || null, applied: applied > 0 };
    LOAD_STATUS.cot = applied > 0;  // true samo ako je stvarno primenjen COT iz fajla
    if (statusEl) {
      const rd = data.reportDate
        ? new Date(data.reportDate).toLocaleDateString(t('dateLocale'),{day:'2-digit',month:'2-digit'})
        : '—';
      // Provera svezine: ako je COT stariji od 10 dana, upozori (crveno)
      let ageDays = null;
      if (data.reportDate) {
        ageDays = Math.floor((Date.now() - new Date(data.reportDate).getTime()) / 86400000);
      }
      const stale = ageDays !== null && ageDays > 10;
      statusEl.textContent = `📊 COT ${rd} (${applied})${stale ? ' ⚠' : ''}`;
      statusEl.style.color = stale ? 'var(--red)' : 'var(--tx2)';
      if (stale) statusEl.title = `COT izveštaj star ${ageDays} dana — CFTC API možda još nije ažuriran`;
    }
    console.log(`[cot] Applied CFTC data for ${applied} currencies, report ${data.reportDate}`);
  } catch(e) {
    console.warn('[cot] Could not load cot.json — koristi se rucni DATA blok.', e.message);
    COT_META = { reportDate: null, applied: false };
    if (statusEl) statusEl.textContent = '📊 COT: ručno';
  }
}

// ── Indicator display names ─────────────────────────────
const INDICATOR_LABELS = {
  GDP:'GDP Growth', CPI:'CPI', CORE_CPI:'Core CPI', HICP:'HICP',
  PPI:'PPI', PCE:'PCE', PMI_MFG:'PMI Mfg', PMI_SVC:'PMI Services',
  PMI_COMP:'PMI Composite', NFP:'Non-Farm Payrolls', EMPLOYMENT:'Employment',
  ADP:'ADP', UNEMPLOYMENT:'Unemployment Rate', JOBLESS_CLAIMS:'Jobless Claims',
  JOLTS:'JOLTS', RETAIL_SALES:'Retail Sales', INTEREST_RATE:'Interest Rate',
  WAGES:'Wages / Earnings', TRADE_BALANCE:'Trade Balance',
  CURRENT_ACCOUNT:'Current Account', INDUSTRIAL_PROD:'Industrial Prod.',
  CONFIDENCE:'Confidence',
};
const HIGH_IMPACT = new Set(['GDP','CPI','CORE_CPI','HICP','PMI_MFG','PMI_SVC','NFP','EMPLOYMENT','UNEMPLOYMENT','INTEREST_RATE','PCE','RETAIL_SALES']);

function renderHeatmapTab(){
  const wrap = document.getElementById('hm-tab-content');
  if (!wrap) return;
  if (!HEATMAP_DATA || !HEATMAP_DATA.currencies) {
    wrap.innerHTML = `<div class="hm-no-data">🌡 Economic Heatmap nije dostupan.<br><span style="font-size:10px;color:var(--tx3)">Pokreni run_cme.bat da generises heatmap.json</span></div>`;
    return;
  }

  const cards = Object.entries(HEATMAP_DATA.currencies).map(([ccy, data]) => {
    const bias = data.bias || 'neut';
    const hpct = data.heatmap || 50;
    const score = data.macro_score || 0;
    const pctCls = hpct >= 55 ? 'pos' : hpct <= 45 ? 'neg' : 'zer';
    const factors = data.factors || {};

    // Sort: high impact first, then by signal (bull first)
    const sortedFactors = Object.entries(factors).sort(([a],[b]) => {
      const aHigh = HIGH_IMPACT.has(a) ? 0 : 1;
      const bHigh = HIGH_IMPACT.has(b) ? 0 : 1;
      if (aHigh !== bHigh) return aHigh - bHigh;
      const sigOrder = {bullish:0, neutral:1, bearish:2};
      return (sigOrder[factors[a].signal]||1) - (sigOrder[factors[b].signal]||1);
    });

    const rows = sortedFactors.map(([itype, f]) => {
      const label = INDICATOR_LABELS[itype] || itype;
      const isHigh = HIGH_IMPACT.has(itype);
      const sigEmoji = f.signal === 'bullish' ? '🟢' : f.signal === 'bearish' ? '🔴' : '⚪';
      const actual = f.actual !== null && f.actual !== undefined ? f.actual : '—';
      const forecast = f.forecast !== null && f.forecast !== undefined ? ` vs ${f.forecast}` : '';
      return `<div class="hm-row">
        <span class="hm-name ${isHigh?'hm-high':''}">${label}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-family:var(--mono);font-size:9px;color:var(--tx2)">${actual}${forecast}</span>
          <span class="hm-sig ${f.signal}">${sigEmoji} ${f.signal}</span>
        </div>
      </div>`;
    }).join('');

    const bullPct = factors && Object.keys(factors).length
      ? Math.round(Object.values(factors).filter(f=>f.signal==='bullish').length / Object.keys(factors).length * 100)
      : 50;

    return `<div class="hm-card c-${bias}">
      <div class="hm-card-top">
        <div>
          <div class="hm-ccy ${bias}">${ccy}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--tx2);margin-top:2px">${data.bull_count||0} bull · ${data.bear_count||0} bear · ${data.neutral_count||0} neut</div>
        </div>
        <div style="text-align:right">
          <div class="hm-pct ${pctCls}">${hpct}%</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--tx2)">score ${score>0?'+':''}${score}</div>
        </div>
      </div>
      <div class="hm-gauge"><div class="hm-gauge-fill" style="width:${hpct}%"></div></div>
      <div class="bias-row" style="margin-bottom:8px">
        <span class="bias-badge bb-${bias}">${t('biasLabel')[bias]||bias}</span>
      </div>
      <div class="hm-indicators">${rows}</div>
      <div class="hm-source">FMP Economic Calendar · ${(data.factors ? Object.keys(data.factors).length : 0)} indicators</div>
    </div>`;
  }).join('');

  const genAt = HEATMAP_DATA.generatedAt
    ? new Date(HEATMAP_DATA.generatedAt).toLocaleString(t('dateLocale'),{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})
    : '—';

  wrap.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-family:var(--mono);font-size:10px;color:var(--tx2)">
        🌡 <strong style="color:var(--tx)">Economic Heatmap</strong> — automatski iz FMP makro podataka
      </div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--tx3)">Generisano: ${genAt}</div>
    </div>
    <div class="hm-grid">${cards}</div>
  `;
}

// AI CHAT — pita Claude-a o trenutnom stanju CME-a.
// Kontekst (svi score-ovi, parovi, konflikti, gold, news) se šalje
// serveru koji proksira ka Anthropic API-ju. Ključ NIKAD nije u HTML-u.
// ══════════════════════════════════════════════════════════
let AI_HISTORY = [];   // [{role:'user'|'assistant', content:'...'}]
let AI_BUSY = false;

// Sklopi kompletan snimak trenutnog stanja za AI (isti izvor kao snapshot)
function buildAiContext(){
  if(!LAST_SCORES) return {};
  const currencies={};
  for(const [ccy,s] of Object.entries(LAST_SCORES)){
    const d=DATA.currencies[ccy];
    const cl=conflictLevel(d.heatmap, d.deltaPct6w);
    currencies[ccy]={
      finalScore:s.score, bias:biasKey(s.score), confidence:s.conf,
      components:{cot:s.cotMom, trendQuality:s.tq, weekly:s.weekly,
                  heatmap:s.hm, news:s.news, penalty:s.penalty},
      inputs:{cotLongPct:d.longPct, cotLongPct6wAgo:d.longPct6wAgo,
              cotDelta6w:d.deltaPct6w, cotDLong:d.dLong, cotDShort:d.dShort,
              tqConsistent:d.tqConsistent+'/6', heatmapPercent:d.heatmap,
              cotNetPosition:d.netPosition!=null?d.netPosition:null,
              cotPercentile3y:d.percentile3y!=null?d.percentile3y:null,
              cotModels:d.cotModels||null,
              lfAmDivergence:d.lfAmDivergence||null},
      conflict: cl==='none' ? null : {
        level: cl,
        cotDirection: d.deltaPct6w>=0?'bullish':'bearish',
        heatmapDirection: d.heatmap===null?'n/a':d.heatmap>=55?'bullish':d.heatmap<=45?'bearish':'neutral',
      },
    };
  }
  // Parovi (isti izračun kao Top Setups / tabela)
  const pairs={};
  for(const p of buildPairResults(LAST_SCORES)){
    const bsC=p.bs.penalty<=-5, qsC=p.qs.penalty<=-5;
    const conflicts=(bsC?1:0)+(qsC?1:0);
    pairs[p.display]={
      spread:p.ps, bias:pairBiasKey(p.ps), confidence:p.pc,
      quality:qualityLabel(p.ps,p.pc),
      baseScore:p.bs.score, quoteScore:p.qs.score,
      conflictCount:conflicts,
      inTopSetups: conflicts===0 && p.pbk!=='noedge',
    };
  }
  const news=(NEWS_DATA&&NEWS_DATA.news)?NEWS_DATA.news.slice(0,12).map(n=>({
    ccy:n.currency, event:n.eventName, impulse:n.impulse, date:n.date,
  })):[];
  return {
    generatedAt: HEATMAP_DATA?HEATMAP_DATA.generatedAt:null,
    engineVersion: CME_ENGINE_VERSION,
    cotReportDate: COT_META?COT_META.reportDate:null,
    currencies, pairs, news,
    gold: GOLD_DATA ? {
      heatmap:GOLD_DATA.heatmap, bias:GOLD_DATA.bias,
      macro:GOLD_DATA.engines?.macro, cot:GOLD_DATA.engines?.cot,
      narrative:GOLD_DATA.narrative?.[lang]||null,
    } : null,
    note: 'CME nema Technical/price komponentu ni Retail Sentiment (uklonjen). '+
          'cotPercentile3y (percentil neto pozicije, 3g) i lfAmDivergence (Leveraged Funds '+
          'vs Asset Managers) su INFORMATIVNI — prikazuju se ali NE ulaze u score. '+
          'cotModels sadrzi sva tri COT modela; score koristi legacy (Non-Commercial).',
  };
}

      ${lang==='sr'

        : 'Ask anything about the current state — the AI sees all scores, components, inputs, conflicts, pairs, news and the Gold model.<br><span style="color:var(--tx2)">It cannot see price or technicals — CME has none yet.</span>'}
    </div>`;

  }).join('') + (AI_BUSY?`<div style="color:var(--tx3);font-size:11px;font-family:var(--mono)">${lang==='sr'?'razmišlja...':'thinking...'}</div>`:'');

function escHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
// Minimalni markdown: **bold**, `code`, prelomi redova, - liste
function mdLite(s){
  let h=escHtml(s);
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/`(.+?)`/g,'<code style="font-family:var(--mono);background:var(--bg2);padding:1px 4px;border-radius:3px">$1</code>');
  h=h.replace(/^- (.+)$/gm,'• $1');
  return h.replace(/\n/g,'<br>');
}

function askAi(q){ document.getElementById('ai-input').value=q; sendAiMessage(); }

async function sendAiMessage(){
  const input=document.getElementById('ai-input');
  const q=input.value.trim();
  if(!q||AI_BUSY) return;
  input.value='';
  AI_HISTORY.push({role:'user',content:q});
  AI_BUSY=true; renderAiMessages(); renderAiSuggestions();
  try{
    const res=await fetch('/ai-chat',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:AI_HISTORY, context:buildAiContext(), lang}),
    });
    const r=await res.json();
    AI_HISTORY.push({role:'assistant', content: r.ok ? r.reply
      : (lang==='sr'?`⚠ Greška: ${r.error}`:`⚠ Error: ${r.error}`)});
  }catch(e){
    AI_HISTORY.push({role:'assistant', content: lang==='sr'
      ? `⚠ Server ne odgovara. Koristi cme_server.py (ne http.server) i postavi ANTHROPIC_API_KEY u run_cme.bat.`
      : `⚠ Server not responding. Use cme_server.py (not http.server) and set ANTHROPIC_API_KEY in run_cme.bat.`});
  }
  AI_BUSY=false; renderAiMessages();
}

function clearAiChat(){ AI_HISTORY=[]; renderAiMessages(); renderAiSuggestions(); }

function renderHistDetail(){
  const detail = document.getElementById('hist-detail');
  const snap = HIST_SNAP;
  if(!snap){ detail.innerHTML=''; return; }
  const biasLabel=t('biasLabel');
  const liveTag = `<span style="font-size:9px;color:var(--grn);border:1px solid var(--gbd);border-radius:3px;padding:1px 5px;margin-left:8px">${lang==='sr'?'UŽIVO':'LIVE'}</span>`;
  const statusTag = snap.status==='partial'

    <button onclick="setHistView('pairs')" style="font-family:var(--mono);font-size:10px;padding:5px 12px;border:none;border-radius:4px;cursor:pointer;background:${HIST_VIEW==='pairs'?'var(--grn)':'transparent'};color:${HIST_VIEW==='pairs'?'#000':'var(--tx2)'}">${lang==='sr'?'PAROVI':'PAIRS'}</button>
    <button onclick="setHistView('currency')" style="font-family:var(--mono);font-size:10px;padding:5px 12px;border:none;border-radius:4px;cursor:pointer;background:${HIST_VIEW==='currency'?'var(--grn)':'transparent'};color:${HIST_VIEW==='currency'?'#000':'var(--tx2)'}">${lang==='sr'?'VALUTE':'CURRENCIES'}</button>
  </div>`;

  const header = `<div style="font-family:var(--mono);font-size:14px;font-weight:600;margin-bottom:2px">${snap.date} ${liveTag}${statusTag}
    ${snap.engineVersion?`<span style="font-size:9px;color:var(--tx3);margin-left:8px">v${snap.engineVersion}</span>`:''}</div>
    <div style="font-size:10px;color:var(--tx3);margin-bottom:14px">${snap.cotReportDate?`COT: ${snap.cotReportDate}`:''}
      ${snap.hasNews?`· 📰 ${snap.newsCount||0}`:''} ${snap.goldLoaded?'· Gold':''}</div>`;

  detail.innerHTML = header + toggle +
    (HIST_VIEW==='pairs' ? renderHistPairs(snap) : renderHistCurrencies(snap));
}

// ── Vrati parove iz snapshota: koristi materijalizovan pairs blok ako
//    postoji (novi snapshoti), inace rekonstruise iz valuta (stari) ──
function histPairResults(snap){
  // Novi format: materijalizovan pairs blok
  if(snap.pairs && Object.keys(snap.pairs).length){
    return Object.entries(snap.pairs).map(([display,p])=>({
      display, base:p.base, quote:p.quote,
      ps:p.spread!=null?p.spread:p.finalScore,
      pc:p.confidence, pbk:p.finalBias,
      alignment:p.alignment, quality:p.quality,
      conflictCount:p.conflictCount,
      baseScore:p.baseScore, quoteScore:p.quoteScore,
      baseBias:p.baseBias, quoteBias:p.quoteBias,
      outcome:p.outcome,
    })).sort((a,b)=>Math.abs(b.ps)-Math.abs(a.ps));
  }
  // Stari format: rekonstruisi iz valuta
  const cur = snap.currencies||{};
  return (DATA.pairs||[]).map(p=>{
    const bs=cur[p.base], qs=cur[p.quote];
    if(!bs||!qs||bs.finalScore==null||qs.finalScore==null) return null;
    const ps=bs.finalScore-qs.finalScore;
    const bc=bs.conf!=null?bs.conf:50, qc=qs.conf!=null?qs.conf:50;
    let pc=Math.round((bc+qc)/2);
    if(Math.abs(ps)<30) pc-=25;
    pc=Math.max(30,Math.min(100,pc));
    return {display:p.base+p.quote, base:p.base, quote:p.quote, ps, pc, pbk:pairBiasKey(ps)};
  }).filter(Boolean).sort((a,b)=>Math.abs(b.ps)-Math.abs(a.ps));
}

function renderHistPairs(snap){
  const pairs = histPairResults(snap);
  if(!pairs.length) return `<div class="hm-no-data">${lang==='sr'?'Nema parova (nedovoljno podataka)':'No pairs (insufficient data)'}</div>`;
  const biasLabel=t('biasLabel');
  const alignTxt=a=>{
    if(!a) return '—';
    if(lang==='sr') return {Aligned:'Poravnat',Opposed:'Suprotan',Neutral:'Neutralan'}[a]||a;
    return a;
  };
  const alignCol=a=>a==='Aligned'?'var(--grn)':a==='Opposed'?'var(--amb)':'var(--tx3)';
  const hasQ = pairs.some(p=>p.quality);
  let html = `<table class="tbl" style="width:100%"><thead><tr>
    <th>${lang==='sr'?'Par':'Pair'}</th><th>${lang==='sr'?'Smer':'Bias'}</th><th>Spread</th><th>Conf.</th>
    ${hasQ?`<th>${lang==='sr'?'Poravnanje':'Alignment'}</th><th>${lang==='sr'?'Kvalitet':'Quality'}</th>`:''}</tr></thead><tbody>`;
  for(const p of pairs){
    const isLong=p.ps>0, noEdge=p.pbk==='noedge';
    const col = noEdge?'var(--tx2)':isLong?'var(--grn)':'var(--red)';

    const confWarn = p.conflictCount>0 ? ` <span style="color:var(--amb)" title="${lang==='sr'?'COT konflikt':'COT conflict'}">⚠</span>` : '';
    html += `<tr style="cursor:pointer" onclick="showHistPairDetail('${p.display}')">
      <td style="font-weight:600;font-family:var(--mono);color:${col}">${p.display}${confWarn}</td>

      <td style="font-family:var(--mono);font-size:10px">${p.pc}%</td>

      <div style="color:var(--tx2);font-weight:600;margin-bottom:4px">${lang==='sr'?'PORAVNANJE (šta znači):':'ALIGNMENT (what it means):'}</div>
      <div><span style="color:var(--grn);font-weight:600">${lang==='sr'?'Poravnat':'Aligned'}</span> — ${lang==='sr'?'jedna valuta jaka, druga slaba → čist smer, obe strane para se slažu (npr. USD +59 vs CAD −57). Najpouzdaniji setup.':'one currency strong, other weak → clean direction, both sides agree (e.g. USD +59 vs CAD −57). Most reliable setup.'}</div>
      <div><span style="color:var(--amb);font-weight:600">${lang==='sr'?'Suprotan':'Opposed'}</span> — ${lang==='sr'?'obe valute u istom smeru (obe jake ili obe slabe) → nejasan spread, slabiji signal (npr. obe bearish, ko je gori?).':'both currencies same direction (both strong or both weak) → unclear spread, weaker signal (e.g. both bearish, which is worse?).'}</div>

// ── Detalj istorijskog para: sve komponente koje su dovele do signala ──
function showHistPairDetail(display){
  const snap=HIST_SNAP; if(!snap) return;
  const P = snap.pairs && snap.pairs[display];
  const detail=document.getElementById('hist-detail');
  const biasLabel=t('biasLabel');
  // Ako nema materijalizovan par (stari snapshot), rekonstruisi osnovno
  const p = P || histPairResults(snap).find(x=>x.display===display);
  if(!p){ return; }
  const base=p.base, quote=p.quote;
  const bc=(snap.currencies||{})[base]||{}, qc=(snap.currencies||{})[quote]||{};
  const ps = P?(P.spread!=null?P.spread:P.finalScore):p.ps;
  const pbk = P?P.finalBias:p.pbk;
  const isLong=ps>0;
  const col=isLong?'var(--grn)':ps<0?'var(--red)':'var(--tx2)';

  // Komponente valuta (iz inputs bloka ako postoji)
  const compRow=(label,bv,qv)=>`<tr>
    <td style="color:var(--tx2);font-size:10px">${label}</td>
    <td class="${bv>0?'t-pos':bv<0?'t-neg':''}" style="font-family:var(--mono);font-size:10px;text-align:right">${bv!=null?fmt(bv):'—'}</td>
    <td class="${qv>0?'t-pos':qv<0?'t-neg':''}" style="font-family:var(--mono);font-size:10px;text-align:right">${qv!=null?fmt(qv):'—'}</td></tr>`;

  let html=`<button onclick="renderHistDetail()" style="background:none;border:1px solid var(--bd);color:var(--tx2);border-radius:5px;padding:4px 10px;font-size:10px;cursor:pointer;margin-bottom:12px">← ${lang==='sr'?'Nazad':'Back'}</button>
    <div style="font-family:var(--mono);font-size:16px;font-weight:600;color:${col};margin-bottom:2px">${display}
      <span style="font-size:13px">${fmt(ps)}</span>
      <span class="bias-badge bb-${pbk}" style="font-size:10px;margin-left:6px">${biasLabel[pbk]||pbk}</span></div>
    <div style="font-size:10px;color:var(--tx3);margin-bottom:14px">${snap.date} · Conf ${P?P.confidence:p.pc}%${P&&P.alignment?` · ${P.alignment}`:''}${P&&P.quality?` · ${t('qualityLabel')[P.quality]||P.quality}`:''}</div>`;

  // Score razlaganje po valuti
  html+=`<table class="tbl" style="width:100%;margin-bottom:14px"><thead><tr>
    <th>${lang==='sr'?'Komponenta':'Component'}</th><th style="text-align:right">${base}</th><th style="text-align:right">${quote}</th></tr></thead><tbody>
    ${compRow('COT', bc.cotScore, qc.cotScore)}
    ${compRow('Trend Quality', bc.tqScore, qc.tqScore)}
    ${compRow('Weekly', bc.weeklyScore, qc.weeklyScore)}
    ${compRow('Heatmap', bc.heatmapScore, qc.heatmapScore)}
    ${compRow('News', bc.newsScore, qc.newsScore)}
    ${compRow('Penalty', bc.penalty, qc.penalty)}
    <tr style="border-top:1px solid var(--bd)">
      <td style="font-weight:600;font-size:11px">Final Score</td>
      <td class="${(bc.finalScore||0)>0?'t-pos':'t-neg'}" style="font-family:var(--mono);font-weight:600;text-align:right">${fmt(bc.finalScore)}</td>
      <td class="${(qc.finalScore||0)>0?'t-pos':'t-neg'}" style="font-family:var(--mono);font-weight:600;text-align:right">${fmt(qc.finalScore)}</td></tr>
    </tbody></table>`;

  // Inputs (ulazi) ako postoje
  if(bc.inputs && qc.inputs){
    const inRow=(label,bv,qv)=>`<tr><td style="color:var(--tx2);font-size:10px">${label}</td>
      <td style="font-family:var(--mono);font-size:10px;text-align:right">${bv!=null?bv:'—'}</td>
      <td style="font-family:var(--mono);font-size:10px;text-align:right">${qv!=null?qv:'—'}</td></tr>`;
    html+=`<div style="font-size:10px;color:var(--tx2);margin-bottom:4px;font-weight:600">${lang==='sr'?'ULAZI':'INPUTS'}</div>
      <table class="tbl" style="width:100%;margin-bottom:14px"><tbody>
      ${inRow('COT Long%', bc.inputs.cotLongPct, qc.inputs.cotLongPct)}
      ${inRow('COT Δ6w', bc.inputs.cotDelta6w!=null?fmt(bc.inputs.cotDelta6w)+'pp':null, qc.inputs.cotDelta6w!=null?fmt(qc.inputs.cotDelta6w)+'pp':null)}
      ${inRow('Heatmap %', bc.inputs.heatmapPercent, qc.inputs.heatmapPercent)}
      ${inRow('News Impulse', bc.inputs.newsImpulse!=null?fmt(bc.inputs.newsImpulse):null, qc.inputs.newsImpulse!=null?fmt(qc.inputs.newsImpulse):null)}
      ${inRow('TQ', bc.inputs.tqConsistent+'/6', qc.inputs.tqConsistent+'/6')}
      </tbody></table>`;
  }

  // ── Konflikt objašnjenje (iz sačuvanih snapshot podataka) ──
  // Rekonstruiše konflikt iz inputs (heatmapPercent + cotDelta6w) svake valute.
  function histConflictBlock(ccy, cc){
    const inp = cc.inputs;
    if(!inp || inp.heatmapPercent==null || inp.cotDelta6w==null) return '';
    const hmPct = inp.heatmapPercent;
    const delta = inp.cotDelta6w;
    const cl = conflictLevel(hmPct, delta);
    if(cl==='none') return '';
    const cotBull = delta>=0;
    const cotDir = cotBull ? (lang==='sr'?'bullish (institucije grade long)':'bullish (building long)')
                           : (lang==='sr'?'bearish (institucije prodaju)':'bearish (selling)');
    const hmDir = hmPct>=55 ? (lang==='sr'?'bullish (fundament jak)':'bullish (strong)')
                : hmPct<=45 ? (lang==='sr'?'bearish (fundament slab)':'bearish (weak)')
                : (lang==='sr'?'neutralan':'neutral');
    const levelWord = cl==='strong' ? (lang==='sr'?'JAK':'STRONG') : (lang==='sr'?'BLAG':'MILD');
    const levelCol = cl==='strong' ? 'var(--red)' : 'var(--amb)';
    let meaning_sr, meaning_en;
    if(cotBull && hmPct<=45){
      meaning_sr = `Fundament je bio <strong>slab</strong> za ${ccy}, ali je COT pokazivao <strong>suprotan (bullish) bias</strong> — institucije su kupovale uprkos lošim podacima.`;
      meaning_en = `Fundamentals were <strong>weak</strong> for ${ccy}, but COT showed the <strong>opposite (bullish) bias</strong> — institutions were buying despite poor data.`;
    } else {
      meaning_sr = `Fundament je bio <strong>jak</strong> za ${ccy}, ali je COT pokazivao <strong>suprotan (bearish) bias</strong> — institucije su prodavale iako su podaci bili dobri.`;
      meaning_en = `Fundamentals were <strong>strong</strong> for ${ccy}, but COT showed the <strong>opposite (bearish) bias</strong> — institutions were selling even though data was good.`;
    }
    return `<div style="margin-bottom:8px;padding:10px;background:var(--abg);border:1px solid ${levelCol};border-radius:6px">
      <div style="font-size:10px;font-weight:700;color:${levelCol};margin-bottom:4px">⚠ ${levelWord} ${lang==='sr'?'KONFLIKT':'CONFLICT'}: ${ccy}</div>
      <div style="display:flex;gap:6px;margin-bottom:5px;font-size:9px">
        <div style="flex:1;padding:4px 6px;background:var(--bg);border-radius:4px">
          <span style="color:var(--tx3)">COT:</span> <span style="color:${cotBull?'var(--grn)':'var(--red)'};font-weight:600">${cotDir}</span></div>
        <div style="align-self:center;color:var(--amb)">⚔</div>
        <div style="flex:1;padding:4px 6px;background:var(--bg);border-radius:4px">
          <span style="color:var(--tx3)">Heatmap:</span> <span style="color:${hmPct>=55?'var(--grn)':hmPct<=45?'var(--red)':'var(--tx2)'};font-weight:600">${hmDir}</span></div>
      </div>
      <div style="font-size:10px;line-height:1.5;color:var(--tx)">${lang==='sr'?meaning_sr:meaning_en}</div>
    </div>`;
  }
  const histConflict = histConflictBlock(base,bc) + histConflictBlock(quote,qc);
  if(histConflict){
    html+=`<div style="font-size:10px;color:var(--tx2);margin-bottom:6px;font-weight:600">${lang==='sr'?'KONFLIKT (COT vs Fundament)':'CONFLICT (COT vs Fundamentals)'}</div>${histConflict}`;
  }

  // Outcome placeholder
  html+=`<div style="padding:10px 12px;background:var(--bg2);border:1px dashed var(--bd);border-radius:6px;font-size:10px;color:var(--tx3)">
    ${lang==='sr'?'📊 Rezultat signala (da li je bias bio tačan, pomak cene, MFE/MAE) — dodaće se kasnije':'📊 Signal outcome (bias correct?, price move, MFE/MAE) — coming later'}</div>`;

  detail.innerHTML=html;
}

function renderHistCurrencies(snap){
  const bk=x=>x||'neut';
  const biasLabel=t('biasLabel');
  // Sortiraj valute po FINAL score (Bias koji ukljucuje News+penale)
  const rows = Object.entries(snap.currencies||{})
    .filter(([k,v])=>v.score!=null)
    .sort((a,b)=>(b[1].score||0)-(a[1].score||0));

  // Confidence helper na osnovu coverage (0.0-1.0)
  const confInfo = (cov)=>{
    if(cov==null) return {level:'unknown', color:'var(--tx3)', label:'—', estimated:false};
    const pct = Math.round(cov*100);
    if(cov >= 0.60) return {level:'good', color:'var(--grn)', label:pct+'%', estimated:false};
    if(cov >= 0.30) return {level:'low',  color:'var(--amb)', label:pct+'% ⚠', estimated:false};
    return {level:'vlow', color:'var(--red)', label:pct+'% ⚠', estimated:true};
  };

  let html = `<table class="tbl" style="width:100%"><thead><tr>
      <th>${lang==='sr'?'Valuta':'Currency'}</th><th>Score</th><th>Bias</th>
      <th>Cov.</th><th>Heatmap</th><th>COT Long%</th><th>Δ6w</th></tr></thead><tbody>`;
  for(const [ccy,v] of rows){
    const b=bk(v.bias);
    const ci=confInfo(v.coverage);
    const biasCell = ci.estimated
      ? `<span style="font-size:9px;color:var(--red);border:1px solid var(--rbd);border-radius:3px;padding:1px 6px" title="${lang==='sr'?'Niska pokrivenost — bias je procena':'Low coverage — bias is an estimate'}">${lang==='sr'?'Procena':'Estimated'}</span>`
      : `<span class="bias-badge bb-${b}" style="font-size:9px${ci.level==='low'?';opacity:.7':''}">${biasLabel[b]||v.bias}</span>`;
    const hmCell = ci.estimated
      ? `<span style="color:var(--tx3)" title="${lang==='sr'?'Niska pokrivenost':'Low coverage'}">~${v.heatmap}%</span>`
      : `${v.heatmap}%`;
    html += `<tr${ci.estimated?' style="opacity:.72"':''}>
      <td style="font-weight:600;font-family:var(--mono)">${ccy}</td>
      <td class="${v.score>0?'t-pos':v.score<0?'t-neg':''}" style="font-family:var(--mono)">${fmt(v.score)}</td>
      <td>${biasCell}</td>
      <td style="color:${ci.color};font-family:var(--mono);font-size:10px">${ci.label}</td>
      <td>${v.heatmap!=null?hmCell:'—'}</td>
      <td>${v.cot_longPct!=null?v.cot_longPct+'%':'—'}</td>
      <td class="${(v.cot_deltaPct6w||0)>0?'t-pos':(v.cot_deltaPct6w||0)<0?'t-neg':''}">${v.cot_deltaPct6w!=null?fmt(v.cot_deltaPct6w)+'pp':'—'}</td>
    </tr>`;
  }
  html += `</tbody></table>`;
  html += `<div style="display:flex;gap:16px;margin-top:8px;font-size:9px;color:var(--tx3);flex-wrap:wrap">
    <span><span style="color:var(--grn)">●</span> ${lang==='sr'?'≥60% pouzdano':'≥60% reliable'}</span>
    <span><span style="color:var(--amb)">●</span> ${lang==='sr'?'30–60% niska pokrivenost':'30–60% low coverage'}</span>
    <span><span style="color:var(--red)">●</span> ${lang==='sr'?'<30% procena':'<30% estimate'}</span>
  </div>`;
  if(snap.gold && snap.gold.heatmap!=null){
    const gb=bk(snap.gold.bias);
    html += `<div style="margin-top:16px;padding:12px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px">
      <div style="font-family:var(--mono);font-size:13px;font-weight:600;margin-bottom:6px">XAU (Gold) <span class="bias-badge bb-${gb}" style="font-size:9px">${biasLabel[gb]||snap.gold.bias}</span> · ${snap.gold.heatmap}%</div>
      <div style="font-size:10px;color:var(--tx2)">Macro: ${snap.gold.macroSig||'—'} · COT: ${snap.gold.cotSig||'—'}</div>
    </div>`;
  }
  return html;
}
