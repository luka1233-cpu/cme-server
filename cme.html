// ══════════════════════════════════════════════════════════
// AUTO-SNAPSHOT — arhivira kompletan Final Bias jednom po dataset-u.
// Dataset fingerprint = generatedAt iz heatmap.json (menja se samo
// kad run_cme.bat generise nove podatke). Refresh = isti fingerprint
// = server preskace duplikat. Final Bias se racuna OVDE (jedini izvor).
// ══════════════════════════════════════════════════════════
async function maybeSaveSnapshot(scores){
  // ZAŠTITA: snapshot se pravi SAMO ako su obavezni izvori uspešno učitani.
  // Sprečava arhiviranje nepotpunog bias-a ako neki JSON nije učitan.
  // Obavezni: heatmap (baza Final Bias) + cot (glavni faktor).
  // Opcioni: news (0 vesti je validno stanje), gold (samo XAU).
  if(!LOAD_STATUS.heatmap || !LOAD_STATUS.cot){
    const missing=[];
    if(!LOAD_STATUS.heatmap) missing.push('heatmap.json');
    if(!LOAD_STATUS.cot) missing.push('cot.json');
    console.warn(`[snapshot] Preskačem — obavezni izvori nisu učitani: ${missing.join(', ')}. `+
                 `Snapshot se NE pravi da se izbegne nepotpun zapis.`);
    return;
  }

  // datasetId: generatedAt iz heatmap-a (fallback news, pa datum)
  const datasetId = (HEATMAP_DATA && HEATMAP_DATA.generatedAt)
    || (NEWS_DATA && NEWS_DATA.generatedAt)
    || new Date().toISOString();

  // Sklopi kompletan snapshot sa Final Bias I razlaganjem svih komponenti
  const currencies={};
  for(const[ccy,s]of Object.entries(scores)){
    const d=DATA.currencies[ccy];
    // Bias interpretacije ulaza (za samostalnu istorijsku analizu)
    const cotBias    = d.deltaPct6w>=0 ? 'Bullish' : 'Bearish';
    const weeklyBias = (d.dLong-d.dShort)>=0 ? 'Bullish' : 'Bearish';
    const hmBias     = (d.heatmap==null) ? 'N/A' : d.heatmap>=55 ? 'Bullish' : d.heatmap<=45 ? 'Bearish' : 'Neutral';
    const tqBias     = d.tqConsistent>=4 ? 'Strong' : d.tqConsistent<=2 ? 'Weak' : 'Moderate';
    const newsImpulse= s.news;

    currencies[ccy]={
      // ── KOMPONENTE (izlazi — raw doprinos svakog faktora u finalScore) ──
      cotScore:    s.cotMom,      // COT momentum
      tqScore:     s.tq,          // Trend Quality
      weeklyScore: s.weekly,      // Weekly acceleration
      heatmapScore:s.hm,          // Heatmap doprinos
      newsScore:   s.news,        // News impuls (posle safety cap-a)
      penalty:     s.penalty,     // Conflict penalty (prikaz)
      finalScore:  s.score,       // FINAL score = suma svih
      finalBias:   biasKey(s.score),
      conf:        s.conf,         // confidence (za par confidence u istoriji)

      // ── INPUTS (ulazi koji su doveli do gornjih score-ova) ──
      // Ako se algoritam promeni, ovi ulazi omogucavaju re-izracun
      // i poredjenje stare vs nove logike na istim podacima.
      inputs: {
        // Sirove vrednosti
        cotLongPct:    d.longPct,
        cotLongPct6w:  d.longPct6wAgo,
        cotDelta6w:    d.deltaPct6w,
        cotDLong:      d.dLong,
        cotDShort:     d.dShort,
        tqConsistent:  d.tqConsistent,
        // Informativno — NE ulazi u score, ali se belezi da bi kasniji
        // walk-forward test percentila imao podatke bez ponovnog povlacenja.
        cotNetPosition: d.netPosition != null ? d.netPosition : null,
        cotPercentile3y: d.percentile3y != null ? d.percentile3y : null,
        cotModels:      d.cotModels || null,
        lfAmDivergence: d.lfAmDivergence || null,
        heatmapPercent:d.heatmap,
        heatmapCoverage:(HEATMAP_DATA&&HEATMAP_DATA.currencies&&HEATMAP_DATA.currencies[ccy])
                         ? HEATMAP_DATA.currencies[ccy].model_coverage : null,
        newsImpulse:   newsImpulse,
        newsContrib:   s.newsContrib || [],
        // Bias interpretacije (citljivo — sta je svaki ulaz "znacio")
        cotBias:       cotBias,
        weeklyBias:    weeklyBias,
        heatmapBias:   hmBias,
        tqBias:        tqBias,
      },

      // ── kompatibilnost sa History tabom ──
      score:       s.score,
      bias:        biasKey(s.score),
      coverage:    (HEATMAP_DATA&&HEATMAP_DATA.currencies&&HEATMAP_DATA.currencies[ccy])
                     ? HEATMAP_DATA.currencies[ccy].model_coverage : null,
      heatmap:     d.heatmap,
      cot_longPct: d.longPct,
      cot_deltaPct6w: d.deltaPct6w,
      cot_tq:      d.tqConsistent,
    };
  }

  // Status: complete ako su svi izvori tu, partial ako opcioni fale
  const allLoaded = LOAD_STATUS.news && LOAD_STATUS.heatmap && LOAD_STATUS.cot && LOAD_STATUS.gold;
  const status = allLoaded ? "complete" : "partial";

  // ── PAIRS blok — svaki par sa punim signalom, spreman za outcome tracking ──
  // Parovi se izvode iz valuta (currencies ostaju izvor istine), ali se ovde
  // materijalizuju da bi pretraga po paru+datumu i buduca analiza bili trivijalni.
  const pairsBlock={};
  for(const p of buildPairResults(scores)){
    const bs=p.bs, qs=p.qs;
    // Alignment: da li se obe valute slazu u smeru (obe bull ili obe bear)
    const baseSide = bs.score>=0?1:bs.score<0?-1:0;
    const quoteSide= qs.score>=0?1:qs.score<0?-1:0;
    // Za par: base bull + quote bear = najjaci aligned signal
    const aligned = (baseSide>0 && quoteSide<0) || (baseSide<0 && quoteSide>0);
    const conflicted = (baseSide>0 && quoteSide>0) || (baseSide<0 && quoteSide<0);
    const alignment = aligned ? 'Aligned' : conflicted ? 'Opposed' : 'Neutral';
    // Kvalitet (isti kao u Top Setups)
    let qlKey=qualityLabel(p.ps,p.pc);
    const bsC=bs.penalty<=-5, qsC=qs.penalty<=-5;
    const conflictCount=(bsC?1:0)+(qsC?1:0);
    if(conflictCount===1) qlKey=downgradeQuality(qlKey);

    pairsBlock[p.display]={
      base:        p.base,
      quote:       p.quote,
      // ── Signal ──
      finalScore:  p.ps,                    // spread = base − quote
      spread:      p.ps,
      finalBias:   pairBiasKey(p.ps),
      confidence:  p.pc,
      alignment:   alignment,               // Aligned | Opposed | Neutral
      quality:     qlKey,
      conflictCount: conflictCount,
      // ── Komponente (doprinos svake valute) ──
      baseScore:   bs.score,
      quoteScore:  qs.score,
      baseBias:    biasKey(bs.score),
      quoteBias:   biasKey(qs.score),
      // ── Outcome (popunjava se KASNIJE — placeholder za analizu uspesnosti) ──
      // Kad dodamo outcome tracking: da li je bias bio tacan, koliko je cena
      // otisla u ocekivanom smeru, max pomak (MFE), max protiv (MAE)...
      outcome: null,
    };
  }

  const snap={
    // ── Metapodaci ──
    snapshotVersion: SNAPSHOT_VERSION,
    engineVersion:   CME_ENGINE_VERSION,
    build:           CME_BUILD,
    status:          status,          // "complete" | "partial"
    date:            new Date().toISOString().slice(0,10),
    datasetId:       datasetId,
    generatedAt:     new Date().toISOString(),
    cotReportDate:   COT_META?COT_META.reportDate:null,
    // ── Status svakog izvora (za dijagnostiku "zasto je X izgledao cudno") ──
    newsLoaded:      LOAD_STATUS.news,
    heatmapLoaded:   LOAD_STATUS.heatmap,
    cotLoaded:       LOAD_STATUS.cot,
    goldLoaded:      LOAD_STATUS.gold,
    // ── Sadrzajni flagovi ──
    hasNews:         LOAD_STATUS.news && !!(NEWS_DATA&&NEWS_DATA.news&&NEWS_DATA.news.length),
    newsCount:       (NEWS_DATA&&NEWS_DATA.news)?NEWS_DATA.news.length:0,
    // ── Podaci ──
    currencies:      currencies,
    pairs:           pairsBlock,
    gold: GOLD_DATA ? {
      finalScore: GOLD_DATA.score, heatmap:GOLD_DATA.heatmap, bias:GOLD_DATA.bias,
      macroScore: GOLD_DATA.engines?.macro?.score, macroSig:GOLD_DATA.engines?.macro?.signal,
      cotScore:   GOLD_DATA.engines?.cot?.score,   cotSig:GOLD_DATA.engines?.cot?.signal,
    } : null,
  };

  try{
    const res=await fetch('/save-snapshot',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(snap),
    });
    if(res.ok){
      const r=await res.json();
      if(r.status==='saved') console.log(`[snapshot] Arhiviran ${r.date} (nov dataset)`);
      else if(r.status==='already-archived') console.log(`[snapshot] ${r.date} već arhiviran — preskačem`);
      HISTORY_INDEX=null; // invalidiraj kes da History tab pokupi novi
    }
  }catch(e){
    // Server ne podrzava POST (npr. obicni http.server) — tiho preskoci
    console.log('[snapshot] Auto-arhiviranje nedostupno (koristi cme_server.py za istoriju).');
  }
}

function showConflict(ccy){
  const d=DATA.currencies[ccy];
  const cotBull=d.deltaPct6w>=0; // derivirano, ne iz DATA
  const hmBull=d.heatmap>=55;
  // Prikazati modal samo ako postoji pravi konflikt (Bull vs Bear)
  if(cotBull===hmBull){return;} // isti smer = nema konflikta, ne prikazuj
  document.getElementById('modal-title-txt').textContent=t('modalTitle');
  document.getElementById('modal-cot-label').textContent=t('modalCotLabel');
  document.getElementById('modal-hm-label').textContent=t('modalHmLabel');
  document.getElementById('m-ccy').textContent=ccy;
  const cotEl=document.getElementById('m-cot');
  cotEl.textContent=cotBull?t('bullish'):t('bearish');
  cotEl.className='modal-row-val '+(cotBull?'bull':'bear');
  document.getElementById('m-cot-icon').textContent=cotBull?'📈':'📉';
  cotEl.innerHTML+=` <span style="font-size:11px;color:var(--tx2);font-weight:400">(Δ ${d.deltaPct6w>0?'+':''}${d.deltaPct6w}pp, ${t('longPct')} ${d.longPct}%)</span>`;
  cotEl.innerHTML+=`<div style="font-size:10px;color:var(--tx2);font-weight:400;font-style:italic;margin-top:3px">↳ ${cotDescription(d)}</div>`;
  const hmEl=document.getElementById('m-hm');
  hmEl.textContent=hmBull?t('bullish'):t('bearish');
  hmEl.className='modal-row-val '+(hmBull?'bull':'bear');
  document.getElementById('m-hm-icon').textContent=hmBull?'📈':'📉';
  hmEl.innerHTML+=` <span style="font-size:11px;color:var(--tx2);font-weight:400">(${d.heatmap}%)</span>`;
  const cotRow=document.querySelector('.modal-row.cot-row');
  const hmRow=document.querySelector('.modal-row.hm-row');
  if(cotBull&&!hmBull){
    cotRow.style.cssText='background:var(--gbg);border:1px solid var(--gbd)';
    hmRow.style.cssText='background:var(--rbg);border:1px solid var(--rbd)';
  }else{
    cotRow.style.cssText='background:var(--rbg);border:1px solid var(--rbd)';
    hmRow.style.cssText='background:var(--gbg);border:1px solid var(--gbd)';
  }
  document.getElementById('m-explain').innerHTML=cotBull&&!hmBull?t('explainCotBull',ccy):t('explainCotBear',ccy);
  const penalty=d.heatmap>70?-10:-5;
  document.getElementById('m-penalty').textContent=t('penaltyText',penalty,penalty<=-10?t('penaltyStrong'):t('penaltyMild'));
  document.getElementById('conflict-modal').classList.add('open');
}
function closeConflict(e){
  if(e.target===document.getElementById('conflict-modal'))document.getElementById('conflict-modal').classList.remove('open');
}

// ══════════════════════════════════════════════════════════
// PAIR DETAIL MODAL — klik na par objasnjava ZASTO je Bull/Bear
// Razlaze oba currency score-a na faktore i pokazuje spread.
// ══════════════════════════════════════════════════════════
function showPairDetail(display){
  if(!LAST_SCORES) return;
  const pair = buildPairResults(LAST_SCORES).find(p=>p.display===display);
  if(!pair) return;
  const {base,quote,bs,qs,ps,pc,pbk}=pair;
  const isLong=ps>0;
  const dirWord = lang==='sr'
    ? (ps>20?'BULLISH (kupovina)':ps<-20?'BEARISH (prodaja)':'NEUTRALAN')
    : (ps>20?'BULLISH (buy)':ps<-20?'BEARISH (sell)':'NEUTRAL');
  const dirCls = ps>20?'bull':ps<-20?'bear':'';

  // Faktori za jednu valutu
  const factorRow=(label,val)=>{
    if(val===0||val===undefined||val===null) return '';
    const cls=val>0?'bull':'bear';
    const sign=val>0?'+':'';
    return `<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0">
      <span style="color:var(--tx2)">${label}</span>
      <span class="modal-row-val ${cls}" style="font-size:11px">${sign}${val}</span></div>`;
  };
  const ccyBlock=(ccy,s)=>{
    const d=DATA.currencies[ccy];
    const scoreCls=s.score>=0?'bull':'bear';
    return `<div style="flex:1;min-width:0">
      <div style="font-family:var(--mono);font-size:15px;font-weight:600;margin-bottom:2px">${ccy}
        <span class="modal-row-val ${scoreCls}" style="font-size:15px">${fmt(s.score)}</span></div>
      <div style="font-size:9px;color:var(--tx3);margin-bottom:6px">${t('longPct')} ${d.longPct}% · HM ${d.heatmap===null?'N/A':d.heatmap+'%'}</div>
      ${factorRow(t('factorCot'),s.cotMom)}
      ${factorRow(t('factorTq'),s.tq)}
      ${factorRow(t('factorWeekly'),s.weekly)}
      ${factorRow(t('factorHeatmap'),s.hm)}
      ${factorRow(t('factorPenalty'),s.penalty)}
      ${s.news?factorRow('📰 '+t('factorNews'),s.news):''}
    </div>`;
  };

  // Objasnjenje logike spread-a
  const strongerCcy = bs.score>=qs.score?base:quote;
  const weakerCcy = bs.score>=qs.score?quote:base;
  let explain;
  if(lang==='sr'){
    explain = `<strong>${display}</strong> je <strong style="color:${isLong?'var(--grn)':'var(--red)'}">${dirWord}</strong> jer je `+
      `<strong>${base}</strong> (${fmt(bs.score)}) ${bs.score>=qs.score?'jači':'slabiji'} od `+
      `<strong>${quote}</strong> (${fmt(qs.score)}). Spread = ${fmt(bs.score)} − ${fmt(qs.score)} = `+
      `<strong>${fmt(ps)}</strong>. Par se kupuje ka jačoj valuti: ${strongerCcy} nad ${weakerCcy}.`;
  }else{
    explain = `<strong>${display}</strong> is <strong style="color:${isLong?'var(--grn)':'var(--red)'}">${dirWord}</strong> because `+
      `<strong>${base}</strong> (${fmt(bs.score)}) is ${bs.score>=qs.score?'stronger':'weaker'} than `+
      `<strong>${quote}</strong> (${fmt(qs.score)}). Spread = ${fmt(bs.score)} − ${fmt(qs.score)} = `+
      `<strong>${fmt(ps)}</strong>. Trade toward the stronger currency: ${strongerCcy} over ${weakerCcy}.`;
  }

  // ── Detaljno objašnjenje konflikta po valuti ──
  // Konflikt = COT smer (institucije) protivreči Heatmap smeru (fundament).
  function conflictBlock(ccy, s){
    const d=DATA.currencies[ccy];
    if(d.heatmap===null||d.heatmap===undefined) return '';
    const cl=conflictLevel(d.heatmap, d.deltaPct6w);
    if(cl==='none') return '';
    const cotBull = d.deltaPct6w>=0;
    const hmPct = d.heatmap;
    // Smerovi
    const cotDir = cotBull ? (lang==='sr'?'bullish (institucije grade long)':'bullish (institutions building long)')
                           : (lang==='sr'?'bearish (institucije prodaju / grade short)':'bearish (institutions selling / building short)');
    const hmDir = hmPct>=55 ? (lang==='sr'?'bullish (fundament jak)':'bullish (strong fundamentals)')
                : hmPct<=45 ? (lang==='sr'?'bearish (fundament slab)':'bearish (weak fundamentals)')
                : (lang==='sr'?'neutralan':'neutral');
    const levelWord = cl==='strong' ? (lang==='sr'?'JAK':'STRONG') : (lang==='sr'?'BLAG':'MILD');
    const levelCol = cl==='strong' ? 'var(--red)' : 'var(--amb)';

    // Šta konflikt znači za tradera
    let meaning_sr, meaning_en;
    if(cotBull && hmPct<=45){
      // institucije long ali fundament slab
      meaning_sr = `Fundament je <strong>slab</strong> za ${ccy} (Heatmap ${hmPct}%), ali COT pokazuje <strong>suprotan (bullish) bias</strong> — institucije kupuju uprkos lošim podacima. "Pametan novac" možda vidi preokret pre nego što se pojavi u podacima. Oprez: jedna strana greši.`;
      meaning_en = `Fundamentals are <strong>weak</strong> for ${ccy} (Heatmap ${hmPct}%), but COT shows the <strong>opposite (bullish) bias</strong> — institutions are buying despite poor data. Smart money may see a reversal before it shows in the data. Caution: one side is wrong.`;
    } else {
      // institucije short ali fundament jak
      meaning_sr = `Fundament je <strong>jak</strong> za ${ccy} (Heatmap ${hmPct}%), ali COT pokazuje <strong>suprotan (bearish) bias</strong> — institucije prodaju iako su podaci dobri. Često znak da je dobra vest već "u ceni" ili da institucije vide vrh. Fundament kasni za pozicioniranjem.`;
      meaning_en = `Fundamentals are <strong>strong</strong> for ${ccy} (Heatmap ${hmPct}%), but COT shows the <strong>opposite (bearish) bias</strong> — institutions are selling even though data is good. Often a sign good news is already "priced in" or institutions see a top. Fundamentals lag positioning.`;
    }

    const penaltyNote_sr = cl==='strong'
      ? `Zbog jakog konflikta, confidence para je umanjen za 25%.`
      : `Zbog blagog konflikta, confidence para je umanjen za 15%.`;
    const penaltyNote_en = cl==='strong'
      ? `Due to strong conflict, pair confidence is reduced by 25%.`
      : `Due to mild conflict, pair confidence is reduced by 15%.`;

    return `<div style="margin-top:12px;padding:12px;background:var(--abg);border:1px solid ${levelCol};border-radius:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:11px;font-weight:700;color:${levelCol};letter-spacing:.05em">⚠ ${levelWord} ${lang==='sr'?'KONFLIKT':'CONFLICT'}: ${ccy}</span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px;font-size:10px">
        <div style="flex:1;padding:6px 8px;background:var(--bg);border-radius:5px">
          <div style="color:var(--tx3);margin-bottom:2px">COT ${lang==='sr'?'(institucije)':'(institutions)'}</div>
          <div style="color:${cotBull?'var(--grn)':'var(--red)'};font-weight:600">${cotDir}</div>
        </div>
        <div style="align-self:center;color:var(--amb);font-family:var(--mono)">⚔</div>
        <div style="flex:1;padding:6px 8px;background:var(--bg);border-radius:5px">
          <div style="color:var(--tx3);margin-bottom:2px">Heatmap ${lang==='sr'?'(fundament)':'(fundamentals)'}</div>
          <div style="color:${hmPct>=55?'var(--grn)':hmPct<=45?'var(--red)':'var(--tx2)'};font-weight:600">${hmDir}</div>
        </div>
      </div>
      <div style="font-size:11px;line-height:1.5;color:var(--tx);margin-bottom:6px">${lang==='sr'?meaning_sr:meaning_en}</div>
      <div style="font-size:9px;color:var(--tx3);font-style:italic">${lang==='sr'?penaltyNote_sr:penaltyNote_en}</div>
    </div>`;
  }
  const conflictHtml = conflictBlock(base,bs) + conflictBlock(quote,qs);

  const box=document.getElementById('pair-modal-box');
  box.innerHTML=`
    <button class="modal-close" onclick="document.getElementById('pair-modal').classList.remove('open')">✕</button>
    <div class="modal-title">${lang==='sr'?'ZAŠTO OVAJ SMER':'WHY THIS DIRECTION'}</div>
    <div class="modal-ccy" style="display:flex;justify-content:space-between;align-items:center">
      <span>${display}</span>
      <span class="modal-row-val ${dirCls}" style="font-size:18px">${fmt(ps)}</span>
    </div>
    <div style="display:flex;gap:16px;margin:14px 0;padding:12px;background:var(--bg);border-radius:8px">
      ${ccyBlock(base,bs)}
      <div style="align-self:center;font-family:var(--mono);font-size:20px;color:var(--amb)">−</div>
      ${ccyBlock(quote,qs)}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:${isLong?'var(--gbg)':'var(--rbg)'};border:1px solid ${isLong?'var(--gbd)':'var(--rbd)'};border-radius:6px;margin-bottom:12px">
      <span style="font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em">Spread</span>
      <span class="modal-row-val ${dirCls}" style="font-size:16px">${fmt(ps)} · ${pc}% conf</span>
    </div>
    <div class="modal-explain">${explain}</div>
    ${conflictHtml}`;
  document.getElementById('pair-modal').classList.add('open');
}
function closePairDetail(e){
  if(e.target===document.getElementById('pair-modal'))document.getElementById('pair-modal').classList.remove('open');
}

    </div>
    <div id="ai-messages" style="min-height:320px;max-height:52vh;overflow-y:auto;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:10px"></div>
    <div id="ai-suggestions" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>
    <div style="display:flex;gap:8px">
      <input id="ai-input" type="text" placeholder="Pitaj o trenutnom stanju..." autocomplete="off"
        onkeydown="if(event.key==='Enter')sendAiMessage()"
        style="flex:1;font-family:inherit;font-size:12px;background:var(--bg2);color:var(--tx);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;outline:none">
      <button id="ai-send" onclick="sendAiMessage()"
        style="font-family:var(--mono);font-size:11px;font-weight:600;background:var(--grn);color:#000;border:none;border-radius:6px;padding:10px 18px;cursor:pointer">POŠALJI</button>
    </div>
  </div>
</div>

<!-- CONFLICT MODAL -->
<div class="modal-overlay" id="conflict-modal" onclick="closeConflict(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('conflict-modal').classList.remove('open')">✕</button>
    <div class="modal-title" id="modal-title-txt"></div>
    <div class="modal-ccy" id="m-ccy"></div>
    <div class="modal-row cot-row">
      <div><div class="modal-row-label" id="modal-cot-label"></div><div class="modal-row-val" id="m-cot"></div></div>
      <div class="modal-row-icon" id="m-cot-icon"></div>
    </div>
    <div class="modal-divider">⟷</div>
    <div class="modal-row hm-row">
      <div><div class="modal-row-label" id="modal-hm-label"></div><div class="modal-row-val" id="m-hm"></div></div>
      <div class="modal-row-icon" id="m-hm-icon"></div>
    </div>
    <div class="modal-explain" id="m-explain"></div>
    <div class="modal-penalty" id="m-penalty"></div>
  </div>
</div>
<div class="modal-overlay" id="pair-modal" onclick="closePairDetail(event)">
  <div class="modal-box" id="pair-modal-box" style="max-width:480px"></div>
</div>
</body>
</html>
