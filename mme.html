// ══════════════════════════════════════════════════════════
// DATA — Heatmap + Retail Sentiment only, NO COT
// ══════════════════════════════════════════════════════════
const DATA = {
  currencies: {
    USD: { heatmap:100, retailLong:62, note_sr:"Heatmap potpuno bullish. Retail nije ekstreman — blaga potvrda.",     note_en:"Heatmap fully bullish. Retail not extreme — mild confirmation." },
    EUR: { heatmap:33,  retailLong:63, note_sr:"Heatmap bearish. Retail 63% long je blagi kontra signal.",            note_en:"Heatmap bearish. Retail 63% long is a mild contra signal." },
    GBP: { heatmap:40,  retailLong:65, note_sr:"Heatmap bearish. Retail 65% long pojačava kontra potvrdu.",           note_en:"Heatmap bearish. Retail 65% long strengthens contra confirmation." },
    JPY: { heatmap:100, retailLong:21, note_sr:"Heatmap potpuno bullish. Retail 79% short = jak kontra signal — visok Confidence.", note_en:"Heatmap fully bullish. Retail 79% short = strong contra signal — high Confidence." },
    CHF: { heatmap:71,  retailLong:52, note_sr:"Heatmap bullish. Retail neutralan — bez uticaja na Confidence.",      note_en:"Heatmap bullish. Retail neutral — no impact on Confidence." },
    CAD: { heatmap:71,  retailLong:14, note_sr:"Heatmap bullish. Retail 86% short = jak kontra signal — visok Confidence.", note_en:"Heatmap bullish. Retail 86% short = strong contra signal — high Confidence." },
    AUD: { heatmap:40,  retailLong:70, note_sr:"Heatmap bearish. Retail 70% long = ekstreman u istom smeru — gomila prenatrpana, Confidence pada.", note_en:"Heatmap bearish. Retail 70% long = extreme same direction — crowded, Confidence drops." },
    NZD: { heatmap:57,  retailLong:12, note_sr:"Heatmap blago bullish. Retail 88% short = ekstreman kontra — visok Confidence.", note_en:"Heatmap mildly bullish. Retail 88% short = extreme contra — high Confidence." },
  },
  pairs: [
    {base:'GBP',quote:'USD'},{base:'AUD',quote:'USD'},{base:'GBP',quote:'JPY'},
    {base:'AUD',quote:'JPY'},{base:'EUR',quote:'USD'},{base:'NZD',quote:'USD'},
    {base:'USD',quote:'JPY'},{base:'USD',quote:'CAD'},{base:'USD',quote:'CHF'},
    {base:'EUR',quote:'JPY'},{base:'GBP',quote:'AUD'},{base:'NZD',quote:'JPY'},
    {base:'AUD',quote:'NZD'},{base:'EUR',quote:'GBP'},
  ],
};

// ══════════════════════════════════════════════════════════
// SCORING ENGINE — Heatmap = Bias, Retail = Confidence only
// ══════════════════════════════════════════════════════════
function heatmapScore(hm){
  // Zonsko skaliranje, konzistentno sa CME pristupom
  if (hm>=90) return  50;
  if (hm>=75) return  35;
  if (hm>=60) return  20;
  if (hm>=50) return  10;
  if (hm>=40) return -10;
  if (hm>=25) return -20;
  if (hm>=10) return -35;
  return -50;
}
function heatmapBias(hm){
  if (hm >= 80) return 'sbull';
  if (hm >= 65) return 'bull';
  if (hm >= 55) return 'wbull';
  if (hm >  44) return 'neut';
  if (hm >= 35) return 'wbear';
  if (hm >= 20) return 'bear';
  return 'sbear';
}
function retailModifier(retailLong, hmBias){
  // Retail NIKAD ne menja Bias — samo Confidence
  if (hmBias === 'neut') return { delta: 0, type: 'neutral' };
  const hmBull = hmBias === 'sbull' || hmBias === 'wbull';
  const retailBull = retailLong > 50;
  const extreme = retailBull ? retailLong : (100 - retailLong);
  const sameDirection = retailBull === hmBull;

  if (extreme >= 70) {
    if (sameDirection) {
      return { delta: -15, type: 'crowded' };
    } else {
      return { delta: +15, type: 'contra-extreme' };
    }
  }
  if (!sameDirection) return { delta: +5, type: 'mild-contra' };
  return { delta: 0, type: 'neutral' };
}
function calcCcy(d){
  const hmScore = heatmapScore(d.heatmap);
  const bias = heatmapBias(d.heatmap);
  const retail = retailModifier(d.retailLong, bias);
  let conf = 60;
  const hmStrength = Math.abs(d.heatmap - 50);
  conf += Math.round(hmStrength * 0.4);
  conf += retail.delta;
  conf = Math.max(30, Math.min(98, conf));

  // News Impulse — direktno menja Score (bez bias-flip zastite jer nema COT-a)
  // Filozofija MME: vesti su ekonomski podaci koji se uklapaju u Heatmap logiku
  const newsRaw = newsImpulseForCcy(d._ccy || '');
  const news = newsRaw.total;
  const finalScore = hmScore + news;

  return { hmScore, bias, retail, conf, news, newsContrib: newsRaw.contributions, finalScore, _heatmapRaw: d.heatmap };
}

// ══════════════════════════════════════════════════════════
// NEWS IMPULSE — ucitava se iz news.json (deljeni sa CME-om)
// U MME vesti direktno menjaju Score bez bias-flip zastite —
// Heatmap je jedini driver, vesti su ekonomski podaci koji
// se prirodno uklapaju u makro logiku.
// ══════════════════════════════════════════════════════════
let NEWS_DATA = { news: [], generatedAt: null };

async function loadNewsJson(){
  const statusEl = document.getElementById('news-status');
  try {
    const res = await fetch('news.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('news.json not found');
    NEWS_DATA = await res.json();
    if (statusEl) {
      const ts = NEWS_DATA.generatedAt
        ? new Date(NEWS_DATA.generatedAt).toLocaleString('sr-Latn-RS', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
        : '—';
      statusEl.textContent = `📰 ${NEWS_DATA.news.length} (${ts})`;
    }
  } catch(e) {
    console.warn('[news] Could not load news.json', e.message);
    NEWS_DATA = { news: [], generatedAt: null };
    if (statusEl) statusEl.textContent = '📰 N/A';
  }
}

function newsImpulseForCcy(ccy){
  let total = 0;
  const contributions = [];
  for (const item of NEWS_DATA.news){
    if (item.ccy !== ccy) continue;
    const pts = item.impulse;
    if (!pts) continue;
    total += pts;
    contributions.push({ item, pts });
  }
  total = Math.max(-15, Math.min(15, Math.round(total)));
  return { total, contributions };
}

function newsChangedBias(s){
  if (!s.news || s.news === 0) return null;
  const baseBk = heatmapBias(s._heatmapRaw || 50); // Bias bez vesti
  const finalBk = heatmapBias((s._heatmapRaw || 50) + (s.news || 0));
  if (baseBk === finalBk) return null;
  const ORDER = ['sbear','wbear','neut','wbull','sbull'];
  const baseIdx = ORDER.indexOf(baseBk);
  const finalIdx = ORDER.indexOf(finalBk);
  return finalIdx > baseIdx ? 'bull' : 'bear';
}

function newsContribDesc(contributions){
  if (!contributions || !contributions.length) return '';
  return contributions.map(c=>{
    const item = c.item;
    const sign = c.pts > 0 ? '+' : '';
    const dayLabel = item.daysAgo===0 ? 'danas' : `pre ${item.daysAgo}d`;
    const dateStr = item.date ? new Date(item.date).toLocaleDateString('sr-Latn-RS', {day:'2-digit',month:'2-digit',year:'numeric'}) : '';
    const eventLabel = item.eventName ? ` — ${item.eventName}` : '';
    return `${item.type}${eventLabel} ${item.actual} vs ${item.forecast??item.previous} (${dayLabel}${dateStr?', '+dateStr:''}, ${sign}${c.pts})`;
  }).join(' · ');
}

let lang='sr';
const t=(k,...a)=>{const v=I18N[lang][k];return typeof v==='function'?v(...a):v};
function updateStaticI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>el.innerHTML=t(el.dataset.i18n));
  const cetStr=new Date().toLocaleString(t('dateLocale'),{timeZone:'Europe/Belgrade',day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('hdr-week').textContent=cetStr;
  const sel=document.getElementById('lang-select');
  if(sel) sel.value=lang;
}
function setLang(newLang){
  lang=newLang;
  updateStaticI18n();renderAll();
}

const fmt=v=>(v>0?'+':'')+v;
const cfCls=c=>c>=80?'hi':c>=60?'mid':'lo';

function retailLabel(type){
  if(type==='contra-extreme') return t('retailContraExtreme');
  if(type==='crowded') return t('retailCrowded');
  if(type==='mild-contra') return t('retailMildContra');
  return t('retailNeutral');
}

function strengthBlocks(conf){
  const filled=Math.round(conf/20);
  const cls=conf>=80?'f-grn':conf>=60?'f-amb':'f-red';
  const ncls=conf>=80?'cn-hi':conf>=60?'cn-mid':'cn-lo';
  return`<div class="strength-row">
    <span class="str-label">CONF</span>
    <div class="str-blocks">${[1,2,3,4,5].map(i=>`<div class="str-block ${i<=filled?cls:''}"></div>`).join('')}</div>
    <span class="str-pct ${ncls}">${conf}%</span>
  </div>`;
}

function renderCcyCard(ccy,d,s){
  const displayScore = s.finalScore;
  const sc=displayScore>0?'pos':displayScore<0?'neg':'zer';
  // Bias se racuna iz finalScore (sa vest uticajem) za MME — vesti direktno menjaju Bias
  const displayBias = heatmapBias(d.heatmap + (s.news||0));
  let badges='';
  if(s.retail.type==='contra-extreme') badges+=`<span class="bdg bdg-pur">${retailLabel(s.retail.type)}</span>`;
  else if(s.retail.type==='crowded') badges+=`<span class="bdg bdg-amb">${retailLabel(s.retail.type)}</span>`;
  const biasChange = newsChangedBias(s);
  if (biasChange) {
    const alertCls = biasChange === 'bear' ? 'news-alert-bear' : 'news-alert-bull';
    const arrow = biasChange === 'bear' ? '↓' : '↑';
    badges += `<span class="${alertCls}">⚡ VEST PROMENILA BIAS ${arrow}</span>`;
  }
  const noteText=lang==='sr'?d.note_sr:d.note_en;
  return`<div class="ccy-card c-${displayBias}">
    <div class="ccy-top">
      <div><div class="ccy-sym ${displayBias}">${ccy}</div>
      <div class="ccy-pct">${t('longPct')} ${d.heatmap}% · ${t('retailPct')} ${d.retailLong}%</div></div>
      <div style="text-align:right"><div class="ccy-score ${sc}">${fmt(displayScore)}</div></div>
    </div>
    <div class="bias-row"><span class="bias-badge bb-${displayBias}">${t('biasLabel')[displayBias]}</span></div>
    ${strengthBlocks(s.conf)}
    ${badges?`<div class="badges">${badges}</div>`:''}
    <div class="factors">
      <div class="frow"><span class="fn">${t('factorHeatmap')} (${d.heatmap}%)</span><span class="fv ${s.hmScore>0?'p':s.hmScore<0?'n':'z'}">${fmt(s.hmScore)}</span></div>
      <div class="frow"><span class="fn">${t('factorRetail')}</span><span class="fv ${s.retail.delta>0?'p':s.retail.delta<0?'n':'z'}">${fmt(s.retail.delta)}</span></div>
      ${s.news!==0?`<div class="frow"><span class="fn">📰 News Impulse</span><span class="fv ${s.news>0?'p':'n'}">${fmt(s.news)}</span></div>
      <div style="font-size:9px;color:var(--tx2);margin:-1px 0 3px;font-style:italic">↳ ${newsContribDesc(s.newsContrib)}</div>`:''}
    </div>
    <div class="why-note">${noteText}</div>
  </div>`;
}

function buildPairResults(scores){
  return DATA.pairs.map(p=>{
    const bs=scores[p.base], qs=scores[p.quote];
    if(!bs||!qs) return null;
    const ps = bs.finalScore - qs.finalScore; // koristi finalScore koji ukljucuje News Impulse
    const pc = Math.round((bs.conf+qs.conf)/2);
    const pbk = ps>10?'bull':ps<-10?'bear':'neut';
    return {...p, display:p.base+p.quote, ps, pc, bs, qs, pbk};
  }).filter(Boolean).sort((a,b)=>Math.abs(b.ps)-Math.abs(a.ps));
}

function renderTable(scores){
  const all=buildPairResults(scores);
  return all.map((p,i)=>{
    const cf=cfCls(p.pc);
    const isLong=p.ps>=0;
    const biasCls=p.ps>10?'t-pos':p.ps<-10?'t-neg':'t-dim';
    const w=Math.min(46,Math.abs(p.ps)/2);
    const barHtml=p.ps>=0?`<div style="position:absolute;left:50%;height:100%;background:var(--grn);border-radius:2px;width:${w}%"></div>`:`<div style="position:absolute;right:50%;height:100%;background:var(--red);border-radius:2px;width:${w}%"></div>`;
    const bRetail = retailLabel(p.bs.retail.type);
    const qRetail = retailLabel(p.qs.retail.type);
    return`<tr>
      <td class="t-dim">${i+1}</td>
      <td style="font-weight:600">${p.display}</td>
      <td style="color:${p.bs.finalScore>=0?'var(--grn)':'var(--red)'}">${fmt(p.bs.finalScore)}</td>
      <td style="color:${p.qs.finalScore>=0?'var(--grn)':'var(--red)'}">${fmt(p.qs.finalScore)}</td>
      <td class="${p.ps>=0?'t-pos':'t-neg'}">${fmt(p.ps)}</td>
      <td><div style="width:70px;height:4px;background:var(--bg4);border-radius:2px;position:relative;overflow:hidden">${barHtml}</div></td>
      <td><span class="cn-${cf}" style="font-family:var(--mono);font-size:10px;font-weight:600">${p.pc}%</span></td>
      <td class="${biasCls}" style="font-size:10px">${p.ps>10?t('bLong'):p.ps<-10?t('bShort'):t('bNeutral')}</td>
      <td style="font-size:9px;color:var(--tx2)">${p.base}: ${bRetail}<br>${p.quote}: ${qRetail}
        ${(()=>{
          let n='';
          const bBC=newsChangedBias(p.bs), qBC=newsChangedBias(p.qs);
          if(bBC){const arrow=bBC==='bear'?'↓':'↑';n+=`<br><span class="${bBC==='bear'?'news-alert-bear':'news-alert-bull'}">⚡ ${p.base} BIAS ${arrow}</span>`;}
          if(qBC){const arrow=qBC==='bear'?'↓':'↑';n+=`<br><span class="${qBC==='bear'?'news-alert-bear':'news-alert-bull'}">⚡ ${p.quote} BIAS ${arrow}</span>`;}
          if(p.bs.newsContrib&&p.bs.newsContrib.length) p.bs.newsContrib.forEach(c=>{const sign=c.pts>0?'+':'';n+=`<br><span style="color:var(--blu)">📰 ${p.base}: ${c.item.eventName||c.item.type} → ${sign}${c.pts}</span>`;});
          if(p.qs.newsContrib&&p.qs.newsContrib.length) p.qs.newsContrib.forEach(c=>{const sign=c.pts>0?'+':'';n+=`<br><span style="color:var(--blu)">📰 ${p.quote}: ${c.item.eventName||c.item.type} → ${sign}${c.pts}</span>`;});
          return n;
        })()}
      </td>
    </tr>`;
  }).join('');
}

function renderAll(){
  const scores={};
  for(const[k,d]of Object.entries(DATA.currencies)){
    d._ccy = k; // pass currency key so calcCcy can look up news
    scores[k]=calcCcy(d);
  }
  document.getElementById('ccy-grid').innerHTML=Object.entries(DATA.currencies).map(([k,d])=>renderCcyCard(k,d,scores[k])).join('');
  document.getElementById('tbl-tbody').innerHTML=renderTable(scores);
}

document.addEventListener('DOMContentLoaded', async ()=>{
  updateStaticI18n();
  await loadNewsJson();
  renderAll();
});
